<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexbot Fleet Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom scrollbar hiding */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Safe area for mobile bottom nav */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Simple animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-bounce { animation: bounce 1s infinite; }
    </style>
</head>
<body class="bg-[#0A0F1A] text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // A helper component to render Lucide icons in our simple setup
        const Icon = ({ name, className }) => {
            const iconHtml = lucide.createIcons({
                icons: { [name]: {} },
                attrs: { class: className }
            });
            return <i data-lucide={name} className={className}></i>;
        };

        // Simulated dynamic data
        const initialRobotsData = { total: 24, online: 18 };
        const initialTasksData = { active: 16, status: 'In Progress', todayCompleted: 128, increase: '+18%' };
        const initialBatteryAlertsData = { batteryAvg: 78, alerts: 8 };
        const initialRobotMapData = [
          { id: 'R1-05', x: 10, y: 24, status: 'offline', hasAlert: true },
          { id: 'R1-01', x: 24, y: 90, status: 'online' },
          { id: 'R2-03', x: 45, y: 6, status: 'online' },
          { id: 'R1-02', x: 35, y: 40, status: 'busy' },
          { id: 'R3-01', x: 75, y: 10, status: 'charging' },
        ];
        const initialHighlightedRobot = {
          id: 'R2-03', status: 'online', model: 'NEXBOT Pro', battery: 86, location: '1F - Restaurant', taskStatus: 'Delivering'
        };
        const initialRecentAlerts = [
          { id: 1, type: 'low_battery', robot: 'R1-05', message: 'R1-05 battery below 20%' },
          { id: 2, type: 'blocked_path', robot: 'R2-01', message: 'R2-01 path is blocked' },
          { id: 3, type: 'spill_detected', robot: 'R2-02', message: 'R2-02 tray spill detected' },
          { id: 4, type: 'maintenance_due', robot: 'R1-03', message: 'R1-03 scheduled maintenance' },
        ];

        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          
          const [batteryAlertsData, setBatteryAlertsData] = useState(initialBatteryAlertsData);
          const [highlightedRobot, setHighlightedRobot] = useState(initialHighlightedRobot);
          const [robotMapData, setRobotMapData] = useState(initialRobotMapData);

          // Update icons when component renders
          useEffect(() => {
              lucide.createIcons();
          });
          
          // Force icon update when view changes
          useEffect(() => {
              setTimeout(() => lucide.createIcons(), 50);
          }, [currentView, robotMapData]);

          useEffect(() => {
            const interval = setInterval(() => {
              setBatteryAlertsData(prev => ({ ...prev, batteryAvg: Math.max(0, Math.min(100, prev.batteryAvg + (Math.random() > 0.5 ? 1 : -1))) }));
              setHighlightedRobot(prev => ({
                ...prev,
                battery: Math.max(0, Math.min(100, prev.battery + (Math.random() > 0.7 ? 1 : -1))),
                taskStatus: Math.random() > 0.8 ? (prev.taskStatus === 'Delivering' ? 'Standby' : 'Delivering') : prev.taskStatus
              }));
               setRobotMapData(prev => prev.map(robot => ({
                ...robot,
                x: Math.max(0, Math.min(90, robot.x + (Math.random() - 0.5) * 2)),
                y: Math.max(0, Math.min(90, robot.y + (Math.random() - 0.5) * 2))
              })));
            }, 3000);
            return () => clearInterval(interval);
          }, []);

          const renderDashboard = () => (
            <div className="pb-24">
              <header className="px-4 pt-6 pb-4 bg-[#0A0F1A] sticky top-0 z-50">
                <div className="flex justify-between items-center mb-6">
                  <div className="flex items-center gap-2">
                    <div className="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden border border-slate-800">
                      <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Nexbot&backgroundColor=1e3a8a" alt="NEXBOT Logo" className="w-full h-full object-contain bg-slate-900" />
                    </div>
                    <div>
                      <h1 className="font-bold text-lg tracking-wide text-white leading-tight">NEXBOT</h1>
                      <p className="text-xs text-slate-400 font-medium">Fleet Management</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="relative">
                      <Icon name="bell" className="w-6 h-6 text-slate-300" />
                      <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-[#0A0F1A]">
                        {batteryAlertsData.alerts}
                      </span>
                    </div>
                    <div className="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center overflow-hidden border border-slate-600">
                      <Icon name="user" className="w-5 h-5 text-slate-300" />
                    </div>
                  </div>
                </div>

                <div className="flex justify-between items-center bg-[#131C2D] rounded-xl p-1.5 border border-slate-800/60">
                  <button className="flex items-center gap-2 px-3 py-2 bg-[#1C263A] rounded-lg text-sm font-medium hover:bg-[#25324D] transition-colors text-slate-200">
                    <Icon name="building" className="w-4 h-4 text-slate-400" />
                    Grand Hotel
                    <Icon name="chevron-down" className="w-4 h-4 text-slate-400 ml-1" />
                  </button>
                  <div className="flex items-center gap-1.5 px-3">
                    <div className="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-pulse"></div>
                    <span className="text-xs font-medium text-green-400">All Operational</span>
                  </div>
                </div>
              </header>

              <main className="px-4 space-y-4">
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-[#131C2D] p-3.5 rounded-2xl border border-slate-800/60 relative overflow-hidden">
                    <div className="text-xs text-slate-400 mb-1">Total Robots</div>
                    <div className="flex items-end justify-between">
                      <div className="text-2xl font-bold text-white">{initialRobotsData.total}</div>
                      <Icon name="activity" className="w-6 h-6 text-blue-500 opacity-80" />
                    </div>
                    <div className="mt-2 flex items-center gap-1.5 text-[10px]">
                      <div className="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
                      <span className="text-slate-400">Online {initialRobotsData.online}</span>
                    </div>
                  </div>
                  
                  <div className="bg-[#131C2D] p-3.5 rounded-2xl border border-slate-800/60 relative overflow-hidden">
                    <div className="text-xs text-slate-400 mb-1">Active Tasks</div>
                    <div className="flex items-end justify-between">
                      <div className="text-2xl font-bold text-white">{initialTasksData.active}</div>
                      <Icon name="clipboard-list" className="w-6 h-6 text-blue-400 opacity-80" />
                    </div>
                    <div className="mt-2 flex items-center gap-1.5 text-[10px]">
                      <div className="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                      <span className="text-blue-400">{initialTasksData.status}</span>
                    </div>
                  </div>
                  
                  <div className="bg-[#131C2D] p-3.5 rounded-2xl border border-slate-800/60 relative overflow-hidden">
                    <div className="text-xs text-slate-400 mb-1">Completed Today</div>
                    <div className="flex items-end justify-between">
                      <div className="text-2xl font-bold text-white">{initialTasksData.todayCompleted}</div>
                      <Icon name="check-square" className="w-6 h-6 text-slate-400 opacity-80" />
                    </div>
                    <div className="mt-2 text-[10px] text-green-400 font-medium">
                      {initialTasksData.increase} <span className="text-slate-500">vs yesterday</span>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-[#131C2D] p-3.5 rounded-2xl border border-slate-800/60 flex flex-col justify-between">
                      <div className="text-xs text-slate-400">Battery Avg</div>
                      <div className="text-xl font-bold text-white mt-1">{batteryAlertsData.batteryAvg}<span className="text-sm font-normal text-slate-400">%</span></div>
                      <Icon name="battery" className="w-4 h-4 text-yellow-500 mt-1" />
                    </div>
                    <div className="bg-[#2A1515] p-3.5 rounded-2xl border border-red-900/30 flex flex-col justify-between">
                      <div className="text-xs text-red-400">Alerts</div>
                      <div className="text-xl font-bold text-red-500 mt-1">{batteryAlertsData.alerts}</div>
                      <Icon name="alert-triangle" className="w-4 h-4 text-red-500 mt-1 animate-pulse" />
                    </div>
                  </div>
                </div>

                <section className="bg-[#131C2D] rounded-2xl border border-slate-800/60 p-3 flex flex-col">
                  <div className="flex justify-between items-center mb-3 px-1">
                    <button className="flex items-center gap-1 text-sm font-semibold text-white">
                      Live Map <span className="text-slate-400 font-normal ml-1">— 1st Floor</span>
                      <Icon name="chevron-down" className="w-4 h-4 text-slate-400" />
                    </button>
                    <div className="flex gap-2">
                      <button className="p-1.5 bg-[#1C263A] rounded-md text-slate-300 hover:text-white"><Icon name="layers" className="w-4 h-4" /></button>
                      <button className="p-1.5 bg-[#1C263A] rounded-md text-slate-300 hover:text-white"><Icon name="maximize" className="w-4 h-4" /></button>
                    </div>
                  </div>
                  
                  <div className="relative h-56 bg-[#0E1524] rounded-xl border border-slate-700/50 overflow-hidden flex items-center justify-center">
                    <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(#3b82f6 1px, transparent 1px)', backgroundSize: '16px 16px' }}></div>
                    <svg className="absolute inset-0 w-full h-full" style={{ strokeDasharray: '6, 6' }}>
                      <path d="M 60 120 L 120 120 L 120 40 L 220 40 L 220 100" fill="none" stroke="#3b82f6" strokeWidth="2" className="opacity-70" />
                    </svg>
                    
                    <span className="absolute top-8 left-8 text-[9px] font-bold text-blue-500/40 tracking-wider">LOBBY</span>
                    <span className="absolute top-20 right-12 text-[9px] font-bold text-blue-500/40 tracking-wider">CONCIERGE</span>
                    <span className="absolute bottom-6 right-20 text-[9px] font-bold text-blue-500/40 tracking-wider">BALLROOM</span>
                    <span className="absolute bottom-8 left-4 text-[9px] font-bold text-blue-500/40 tracking-wider">RESTAURANT</span>

                    {robotMapData.map(robot => {
                      let statusBorder = 'green-500', statusShadow = 'rgba(34,197,94,0.3)', statusColor = 'text-green-400';
                      if (robot.status === 'offline') { statusBorder = 'red-500'; statusShadow = 'rgba(239,68,68,0.3)'; statusColor = 'text-red-400';} 
                      else if (robot.status === 'busy') { statusBorder = 'blue-500'; statusShadow = 'rgba(59,130,246,0.3)'; statusColor = 'text-blue-400';} 
                      else if (robot.status === 'charging') { statusBorder = 'yellow-500'; statusShadow = 'rgba(234,179,8,0.3)'; statusColor = 'text-yellow-400';}
                      
                      return (
                        <div key={robot.id} className="absolute flex flex-col items-center transition-all duration-1000 ease-in-out" style={{ top: `${robot.y}%`, left: `${robot.x}%` }}>
                          <div className="relative">
                            <div className={`w-7 h-7 bg-[#1C263A] rounded-full border-2 border-${statusBorder} flex items-center justify-center z-10 relative shadow-[0_0_10px_${statusShadow}]`}>
                              <Icon name="activity" className="w-3.5 h-3.5 text-white" />
                            </div>
                            {robot.hasAlert && <Icon name="alert-triangle" className="w-3 h-3 text-red-500 absolute -top-1 -right-2 z-20 animate-bounce" />}
                          </div>
                          <div className={`mt-1 bg-[#1C263A] px-1.5 py-0.5 rounded text-[9px] ${statusColor} font-medium border border-${statusBorder}/30`}>{robot.id}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="flex justify-between items-center mt-3 px-2 text-[10px] text-slate-400">
                    <div className="flex gap-3">
                      <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>Online</span>
                      <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>Busy</span>
                      <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-yellow-500"></span>Charging</span>
                      <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>Offline</span>
                    </div>
                    <span className="flex items-center gap-1"><span className="w-4 h-[2px] bg-blue-500 opacity-70" style={{borderStyle: 'dashed'}}></span>Task Route</span>
                  </div>
                </section>

                <section className="bg-[#131C2D] rounded-2xl border border-slate-800/60 p-4">
                  <div className="font-semibold text-white mb-4">Robot Highlight</div>
                  <div className="flex gap-4">
                    <div className="w-24 h-32 bg-gradient-to-b from-[#1C263A] to-[#0A0F1A] rounded-xl flex items-center justify-center border border-slate-700/50 shadow-inner">
                       <div className="w-16 h-20 bg-blue-900/20 rounded-lg flex flex-col items-center justify-center border border-blue-500/20 relative overflow-hidden">
                         <div className="absolute inset-0 bg-blue-500/10 animate-pulse"></div>
                         <div className="w-8 h-4 bg-black rounded-sm mb-1 flex items-center justify-center"><div className="w-6 h-1.5 bg-blue-400 rounded-full blur-[1px]"></div></div>
                         <div className="w-10 h-10 bg-slate-800 rounded-md relative z-10">
                            <div className="absolute top-1 left-1 w-2 h-2 bg-blue-500 rounded-full"></div>
                            <div className="absolute top-1 right-1 w-2 h-2 bg-blue-500 rounded-full"></div>
                         </div>
                       </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col justify-between">
                      <div>
                        <div className="flex justify-between items-start mb-2">
                          <h3 className="text-xl font-bold text-white">{highlightedRobot.id}</h3>
                          <span className={`flex items-center gap-1 text-[10px] ${highlightedRobot.status === 'online' ? 'text-green-400 bg-green-500/10 border-green-500/20' : 'text-red-400 bg-red-500/10 border-red-500/20'} px-2 py-0.5 rounded-full border`}>
                            <span className={`w-1.5 h-1.5 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500 shadow-[0_0_4px_#22c55e]' : 'bg-red-500'}`}></span>
                            {highlightedRobot.status === 'online' ? 'Online' : 'Offline'}
                          </span>
                        </div>
                        <div className="grid grid-cols-2 gap-y-1 text-xs mb-3">
                          <span className="text-slate-400">Model</span>
                          <span className="text-white text-right font-medium">{highlightedRobot.model}</span>
                          
                          <span className="text-slate-400">Battery</span>
                          <div className="flex items-center justify-end gap-1 text-white font-medium">
                            {highlightedRobot.battery}%
                            <div className="w-8 h-1 bg-slate-700 rounded-full overflow-hidden">
                              <div className="h-full bg-green-500 rounded-full transition-all duration-500" style={{ width: `${highlightedRobot.battery}%` }}></div>
                            </div>
                          </div>
                          
                          <span className="text-slate-400">Location</span>
                          <span className="text-white text-right font-medium">{highlightedRobot.location}</span>
                          
                          <span className="text-slate-400">Status</span>
                          <span className="text-white text-right font-medium">{highlightedRobot.taskStatus}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  <div className="mt-4 relative h-20 bg-black rounded-lg overflow-hidden border border-slate-700">
                     <img src="https://images.unsplash.com/photo-1542314831-c6a4d27ce6a2?auto=format&fit=crop&w=400&q=80" alt="Camera Feed" className="w-full h-full object-cover opacity-60" />
                     <div className="absolute top-2 left-2 flex items-center gap-1.5 text-[10px] text-white bg-black/60 px-1.5 py-0.5 rounded backdrop-blur-sm">
                       <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Live Camera
                     </div>
                  </div>

                  <button onClick={() => setCurrentView('robotDetails')} className="w-full mt-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-semibold transition-colors shadow-[0_4px_14px_rgba(37,99,235,0.3)]">
                    View Robot Details
                  </button>
                </section>
              </main>
            </div>
          );

          const renderRobotDetails = () => (
            <div className="pb-24 animate-in fade-in duration-300">
              <header className="px-4 py-4 flex items-center justify-between bg-[#0A0F1A] sticky top-0 z-50">
                <button onClick={() => setCurrentView('dashboard')}><Icon name="arrow-left" className="w-6 h-6 text-slate-200" /></button>
                <h1 className="text-lg font-semibold text-white tracking-wide">Robot Status</h1>
                <Icon name="more-horizontal" className="w-6 h-6 text-slate-200" />
              </header>

              <main className="px-4 space-y-4">
                <section className="flex justify-between items-start pt-2">
                  <div className="flex gap-3">
                     <div className="w-16 h-20 bg-gradient-to-b from-[#1C263A] to-[#0A0F1A] rounded-xl flex items-center justify-center border border-slate-700/50 shadow-inner">
                       <div className="w-12 h-14 bg-blue-900/20 rounded-lg flex flex-col items-center justify-center border border-blue-500/20 relative">
                         <div className="w-6 h-3 bg-black rounded-sm mb-1 flex items-center justify-center"><div className="w-4 h-1 bg-blue-400 rounded-full blur-[1px]"></div></div>
                         <div className="w-8 h-8 bg-slate-800 rounded-md"></div>
                       </div>
                    </div>
                    <div className="flex flex-col justify-center">
                      <div className="flex items-center gap-2">
                        <h2 className="text-xl font-bold text-white">R2-03</h2>
                        <span className="flex items-center gap-1 text-[10px] font-medium text-green-400">
                          <span className="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_4px_#22c55e]"></span> Online
                        </span>
                      </div>
                      <p className="text-xs text-slate-400 mt-1">Hotel Lobby • Floor 1</p>
                      
                      <div className="flex gap-2 mt-2">
                        <div className="bg-[#1C263A] px-2 py-1 rounded-md text-[10px]">
                          <span className="text-slate-400 block mb-0.5">Model</span>
                          <span className="text-white font-medium">Hotel Pro</span>
                        </div>
                        <div className="bg-[#1C263A] px-2 py-1 rounded-md text-[10px]">
                          <span className="text-slate-400 block mb-0.5">Firmware</span>
                          <span className="text-white font-medium">v2.4.6</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  <div className="text-right flex flex-col items-end">
                     <span className="text-xs text-slate-400 mb-1">Battery</span>
                     <div className="flex items-center gap-1">
                       <span className="text-2xl font-bold text-white">86%</span>
                       <Icon name="battery-charging" className="w-6 h-6 text-green-500" />
                     </div>
                     <span className="text-[10px] text-slate-400 mt-2">Charging Status</span>
                     <span className="text-[10px] text-green-400 font-medium mt-0.5">Not Charging</span>
                  </div>
                </section>

                <div className="flex overflow-x-auto gap-6 border-b border-slate-800/80 pt-2 pb-0 scrollbar-hide">
                  <button className="flex items-center gap-1.5 pb-3 border-b-2 border-blue-500 text-blue-400 font-medium text-sm whitespace-nowrap">
                    <Icon name="cpu" className="w-4 h-4" /> Overview
                  </button>
                  <button className="flex items-center gap-1.5 pb-3 border-b-2 border-transparent text-slate-400 font-medium text-sm whitespace-nowrap">
                    <Icon name="settings" className="w-4 h-4" /> Hardware
                  </button>
                  <button className="flex items-center gap-1.5 pb-3 border-b-2 border-transparent text-slate-400 font-medium text-sm whitespace-nowrap">
                    <Icon name="layers" className="w-4 h-4" /> Software
                  </button>
                </div>

                <section>
                  <h3 className="text-sm font-semibold text-slate-200 mb-3">Location</h3>
                  <div className="bg-[#131C2D] rounded-2xl border border-slate-800/60 p-3 flex gap-4">
                    <div className="w-[140px] h-28 bg-[#0E1524] rounded-xl border border-slate-700/50 overflow-hidden relative">
                       <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(#3b82f6 1px, transparent 1px)', backgroundSize: '12px 12px' }}></div>
                       <div className="absolute top-4 left-4 w-2 h-2 bg-blue-500 rounded-full"></div>
                       <div className="absolute bottom-6 right-8">
                         <Icon name="map-pin" className="w-5 h-5 text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.8)] animate-pulse" />
                       </div>
                       <span className="absolute bottom-2 left-2 text-[8px] font-bold text-blue-500/40">Lobby</span>
                    </div>
                    
                    <div className="flex-1 flex flex-col justify-between py-1">
                      <div className="flex items-start gap-2">
                        <Icon name="map-pin" className="w-4 h-4 text-blue-400 mt-0.5" />
                        <div>
                          <div className="text-[10px] text-slate-400">Current Position</div>
                          <div className="text-sm font-medium text-white">Hotel Lobby (1F)</div>
                        </div>
                      </div>
                      <div className="flex items-start gap-2">
                        <Icon name="compass" className="w-4 h-4 text-slate-400 mt-0.5" />
                        <div>
                          <div className="text-[10px] text-slate-400">Heading</div>
                          <div className="text-sm font-medium text-white">120° SE</div>
                        </div>
                      </div>
                      <button className="w-full mt-2 py-1.5 border border-blue-500/30 bg-blue-900/20 text-blue-400 rounded-lg text-xs font-medium flex items-center justify-center gap-1">
                        <Icon name="map" className="w-3.5 h-3.5" /> View Live Map
                      </button>
                    </div>
                  </div>
                </section>

                <div className="grid grid-cols-2 gap-3">
                  <section className="bg-[#131C2D] rounded-2xl border border-slate-800/60 p-3.5 flex flex-col justify-between">
                    <h3 className="text-sm font-semibold text-slate-200 mb-3">Battery & Power</h3>
                    <div className="flex items-center gap-3 mb-4">
                      <div className="relative w-16 h-16 flex items-center justify-center">
                        <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
                          <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#1C263A" strokeWidth="4" />
                          <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#22c55e" strokeWidth="4" strokeDasharray="86, 100" />
                        </svg>
                        <div className="absolute text-center">
                          <div className="text-lg font-bold text-white leading-tight">86<span className="text-[10px]">%</span></div>
                        </div>
                      </div>
                      <div className="flex-1 space-y-1.5">
                        <div className="flex justify-between items-center text-[10px]"><span className="text-slate-400">Voltage</span><span className="text-white font-medium">24.6 V</span></div>
                        <div className="flex justify-between items-center text-[10px]"><span className="text-slate-400">Temp</span><span className="text-white font-medium">31°C</span></div>
                        <div className="flex justify-between items-center text-[10px]"><span className="text-slate-400">Health</span><span className="text-green-400 font-medium">Good</span></div>
                      </div>
                    </div>
                  </section>

                  <section className="bg-[#131C2D] rounded-2xl border border-slate-800/60 p-3.5 flex flex-col justify-between">
                    <h3 className="text-sm font-semibold text-slate-200 mb-3">Payload Status</h3>
                    <div className="flex items-center gap-3 mb-4">
                      <div className="w-14 h-14 rounded-full border-2 border-blue-500/20 flex items-center justify-center bg-blue-900/10">
                        <Icon name="package" className="w-7 h-7 text-blue-400" />
                      </div>
                      <div className="flex-1 space-y-1.5">
                        <div><div className="text-[9px] text-slate-400">Load</div><div className="text-xs font-medium text-white">5.2 kg</div></div>
                        <div><div className="text-[9px] text-slate-400">Capacity</div><div className="text-xs font-medium text-white">20 kg</div></div>
                      </div>
                    </div>
                  </section>
                </div>
              </main>
            </div>
          );

          return (
            <div className="min-h-screen bg-[#0A0F1A] text-slate-200 font-sans">
              {currentView === 'dashboard' ? renderDashboard() : renderRobotDetails()}

              <nav className="fixed bottom-0 left-0 right-0 bg-[#0A0F1A]/90 backdrop-blur-md border-t border-slate-800/80 px-2 py-2 pb-safe z-50">
                <div className="max-w-md mx-auto flex justify-around items-center">
                  <button onClick={() => setCurrentView('dashboard')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors rounded-xl ${currentView === 'dashboard' ? 'text-blue-500 bg-blue-900/20' : 'text-slate-400'}`}>
                    <Icon name="home" className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">Dashboard</span>
                  </button>
                  <button onClick={() => setCurrentView('robotDetails')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors rounded-xl ${currentView === 'robotDetails' ? 'text-blue-500 bg-blue-900/20' : 'text-slate-400'}`}>
                    <Icon name="activity" className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">Robots</span>
                  </button>
                  <div className="relative -top-5">
                    <button className="w-14 h-14 bg-blue-600 rounded-full flex flex-col items-center justify-center text-white shadow-[0_4px_16px_rgba(37,99,235,0.4)] border-4 border-[#0A0F1A]">
                      <Icon name="plus" className="w-6 h-6" />
                    </button>
                    <span className="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[10px] font-medium text-slate-300 whitespace-nowrap">Task</span>
                  </div>
                  <button className="flex flex-col items-center p-2 text-slate-400 min-w-[64px]">
                    <Icon name="list" className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium mt-1">Tasks</span>
                  </button>
                  <button className="flex flex-col items-center p-2 text-slate-400 min-w-[64px]">
                    <Icon name="more-horizontal" className="w-6 h-6 mb-1" />
                    <span className="text-[10px] font-medium">More</span>
                  </button>
                </div>
              </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
