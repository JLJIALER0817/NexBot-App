<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexbot Fleet Management</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              // 显式扩展深色值，防止浏览器因找不到类而 fallback 渲染成白色/浅灰色亮边框
              850: '#151c2c', 
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar hide rules */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Smooth transition presets */
    .transition-all-300 {
      transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Animation helper for views changing */
    .animate-slide-in {
      animation: slideIn 250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Safe-area support for mobile devices */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }

    /* Radar Ping Wave Animation */
    @keyframes radar-ping {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }
    .radar-pulse {
      animation: radar-ping 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
  </style>
</head>
<body class="h-[100dvh] w-full bg-[#070b14] sm:bg-[#000000] text-white font-sans flex justify-center overflow-hidden selection:bg-blue-500/30">

  <!-- Main Mobile Container Frame (Borders completely removed to avoid any outer frame borders) -->
  <div class="w-full max-w-[480px] h-full bg-[#070b14] relative flex flex-col shadow-2xl overflow-hidden">
    
    <!-- App Header -->
    <header id="app-header" class="px-5 pt-12 pb-4 flex items-center justify-between sticky top-0 z-45 bg-[#070b14]/90 backdrop-blur-md shrink-0 border-b border-gray-900/20">
      <!-- Generated Dynamically -->
    </header>

    <!-- Main Content Area where views switch dynamically -->
    <main id="main-content" class="flex-1 flex flex-col overflow-hidden relative bg-[#070b14]">
      <!-- Views are rendered inside this section dynamically -->
    </main>

    <!-- Bottom Navigation Bar (Matching exact screenshot layouts and counts) -->
    <nav class="sticky bottom-0 w-full bg-[#070b14]/95 backdrop-blur-lg border-t border-gray-800/80 px-2 pb-safe pt-2 flex justify-between items-end z-40">
      <button onclick="navigate('dashboard')" id="nav-dashboard" class="flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-xl mb-1 mx-0.5 transition-all-300">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="text-[9px] font-medium">Dashboard</span>
      </button>
      
      <button onclick="navigate('robots')" id="nav-robots" class="flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-xl mb-1 mx-0.5 transition-all-300">
        <i data-lucide="bot" class="w-5 h-5"></i>
        <span class="text-[9px] font-medium">Robots</span>
      </button>
      
      <button onclick="openDispatchModal()" id="nav-create" class="flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-xl mb-1 mx-0.5 transition-all-300 text-gray-500 hover:text-gray-300">
        <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-[0_2px_12px_rgba(37,99,235,0.4)] hover:bg-blue-500 transition-transform active:scale-95">
          <i data-lucide="plus" class="w-5 h-5"></i>
        </div>
        <span class="text-[9px] font-medium">Create Task</span>
      </button>
      
      <!-- Tasks button configured with dynamic 16 count badge matching screenshot -->
      <button onclick="navigate('tasks')" id="nav-tasks" class="flex-1 flex flex-col items-center justify-center gap-1 py-1.5 transition-colors mb-1 mx-0.5 relative text-gray-500 hover:text-gray-300">
        <div class="absolute top-0.5 right-[18%] bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border border-[#070b14] leading-none">16</div>
        <i data-lucide="clipboard-list" class="w-5 h-5"></i>
        <span class="text-[9px] font-medium">Tasks</span>
      </button>
      
      <button onclick="navigate('settings')" id="nav-settings" class="flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-xl mb-1 mx-0.5 transition-all-300 relative">
        <div class="absolute top-1.5 right-[30%] w-1.5 h-1.5 bg-red-500 rounded-full border border-[#070b14]"></div>
        <i data-lucide="more-horizontal" class="w-5 h-5"></i>
        <span class="text-[9px] font-medium">More</span>
      </button>
    </nav>

    <!-- Dispatch Task Overlay Modal -->
    <div id="dispatch-modal" class="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-end justify-center">
      <div class="w-full bg-[#0d1321] rounded-t-3xl border-t border-gray-800 p-6 space-y-5 animate-slide-in max-h-[85vh] overflow-y-auto hide-scrollbar">
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-white flex items-center gap-2">
            <i data-lucide="zap" class="w-5 h-5 text-blue-500"></i> Dispatch Nexbot Task
          </h2>
          <button onclick="closeDispatchModal()" class="p-1 hover:bg-gray-800 rounded-full text-gray-400 hover:text-white transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <form id="dispatch-form" onsubmit="handleDispatchTask(event)" class="space-y-4 text-sm">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Select Robot Unit</label>
            <select id="dispatch-robot-select" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <!-- Rendered via JS -->
            </select>
          </div>
          
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Task Action</label>
            <div class="grid grid-cols-2 gap-2">
              <label class="flex items-center gap-2 bg-[#161f30] border border-gray-800 rounded-xl p-3 cursor-pointer hover:bg-blue-950/20 hover:border-blue-500/50 transition-all">
                <input type="radio" name="dispatch-action" value="Delivering" checked class="accent-blue-500">
                <span class="text-xs text-gray-200 font-medium">Deliver Goods</span>
              </label>
              <label class="flex items-center gap-2 bg-[#161f30] border border-gray-800 rounded-xl p-3 cursor-pointer hover:bg-blue-950/20 hover:border-blue-500/50 transition-all">
                <input type="radio" name="dispatch-action" value="Cleaning" class="accent-blue-500">
                <span class="text-xs text-gray-200 font-medium">Sanitize / Clean</span>
              </label>
            </div>
          </div>
          
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Destination Zone</label>
            <select id="dispatch-zone" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="1F - Lobby">1F - Lobby</option>
              <option value="1F - Restaurant">1F - Restaurant</option>
              <option value="1F - Ballroom">1F - Ballroom</option>
              <option value="1F - Concierge">1F - Concierge</option>
              <option value="1F - Charging Station">1F - Charging Station</option>
            </select>
          </div>

          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Payload Weight estimate (kg)</label>
            <input id="dispatch-payload" type="number" min="0" max="20" value="3" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          
          <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20">
            Confirm & Dispatch Now
          </button>
        </form>
      </div>
    </div>

    <!-- Toast Notification Wrapper -->
    <div id="toast-container" class="absolute top-16 left-1/2 -translate-x-1/2 w-[90%] z-50 flex flex-col gap-2 pointer-events-none">
      <!-- Toasts inserted programmatically -->
    </div>

  </div>

  <script>
    // System State Storage - values are perfectly configured as per the image
    const state = {
      currentView: 'dashboard',
      history: ['dashboard'],
      highlightIdx: 0,
      activeRobotTab: 'all',
      searchQuery: '',
      metrics: { total: 24, online: 18, active: 16, completed: 128, battery: 78, alerts: 8 },
      tasks: { inProgress: 16, pending: 12, completed: 128, failed: 4, cancelled: 2 },
      robots: [
        { id: 'R2-03', status: 'online', x: 46, y: 24, battery: 86, location: 'Hotel Lobby • Floor 1', activity: 'Delivering', heading: 120, coords: {x: 12.45, y: 8.32}, voltage: 24.6, temp: 31, payload: 5.2, uptimeMinutes: 3752 },
        { id: 'R1-04', status: 'busy', x: 36, y: 30, battery: 42, location: '1F - Lobby', activity: 'Cleaning', heading: 45, coords: {x: 8.12, y: 15.4}, voltage: 23.1, temp: 34, payload: 1.2, uptimeMinutes: 1420 },
        { id: 'R1-01', status: 'charging', x: 70, y: 26, battery: 12, location: '1F - Charging Station', activity: 'Charging', heading: 0, coords: {x: 2.5, y: 2.5}, voltage: 26.2, temp: 38, payload: 0, uptimeMinutes: 8500 },
        { id: 'R1-05', status: 'offline', x: 13, y: 33, battery: 5, location: '1F - Storage', activity: 'Offline', heading: 180, coords: {x: 0, y: 0}, voltage: 21.0, temp: 22, payload: 0, uptimeMinutes: 0 },
        { id: 'R1-01_b', status: 'online', x: 20, y: 37, battery: 92, location: '1F - Restaurant', activity: 'Standby', heading: 210, coords: {x: 4.1, y: 9.3}, voltage: 24.8, temp: 29, payload: 0, uptimeMinutes: 4100 },
        { id: 'R1-02', status: 'busy', x: 38, y: 36, battery: 55, location: '1F - Elevator Lobby', activity: 'Navigating', heading: 90, coords: {x: 10.2, y: 12.1}, voltage: 23.9, temp: 33, payload: 4.0, uptimeMinutes: 2200 },
        { id: 'R2-02', status: 'busy', x: 66, y: 35, battery: 71, location: '1F - Ballroom', activity: 'Delivering', heading: 160, coords: {x: 18.5, y: 14.2}, voltage: 24.1, temp: 32, payload: 8.5, uptimeMinutes: 1900 },
      ],
      activeTelemetryTab: 'Overview'
    };

    // Helper: Build professional, gorgeous vector-based autonomous hotel delivery robot
    function getPremiumRobotSVG(status) {
      const isOffline = status === 'offline';
      const indicatorColor = isOffline ? '#ef4444' : '#22d3ee';
      const lidGlow = isOffline ? '#ef4444' : '#3b82f6';
      
      return `
        <svg viewBox="0 0 100 130" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
          <!-- Background glow shadow -->
          <ellipse cx="50" cy="115" rx="30" ry="8" fill="rgba(0,0,0,0.5)" />
          
          <!-- Robot body chassis (Premium Metallic Dark Blue & Silver-gray) -->
          <rect x="22" y="30" width="56" height="80" rx="14" fill="#1e293b" stroke="#475569" stroke-width="2.5" />
          <rect x="26" y="34" width="48" height="72" rx="10" fill="#0f172a" />
          
          <!-- Layer Trays (Doorless delivery compartments) -->
          <!-- Tray 1 -->
          <rect x="30" y="44" width="40" height="14" rx="3" fill="#1e293b" stroke="#334155" />
          <line x1="30" y1="51" x2="70" y2="51" stroke="#475569" stroke-width="1" />
          
          <!-- Tray 2 -->
          <rect x="30" y="64" width="40" height="14" rx="3" fill="#1e293b" stroke="#334155" />
          <line x1="30" y1="71" x2="70" y2="71" stroke="#475569" stroke-width="1" />
          
          <!-- Tray 3 -->
          <rect x="30" y="84" width="40" height="14" rx="3" fill="#1e293b" stroke="#334155" />
          <line x1="30" y1="91" x2="70" y2="91" stroke="#475569" stroke-width="1" />
          
          <!-- Upper Head Console & Control Screen -->
          <path d="M 28 30 L 72 30 L 66 12 L 34 12 Z" fill="#334155" stroke="#475569" stroke-width="2" />
          <rect x="38" y="16" width="24" height="10" rx="2" fill="#000" stroke="#64748b" />
          <!-- Screen Info Indicator lights -->
          <circle cx="44" cy="21" r="1.5" fill="${indicatorColor}" />
          <circle cx="50" cy="21" r="1.5" fill="${indicatorColor}" />
          <circle cx="56" cy="21" r="1.5" fill="${indicatorColor}" />
          
          <!-- Top LiDAR Turret Cap (Autonomous Driving Kit) -->
          <rect x="42" y="4" width="16" height="8" rx="2" fill="#020617" stroke="#475569" stroke-width="1.5" />
          <rect x="45" y="1" width="10" height="3" rx="1" fill="${lidGlow}" />
          
          <!-- Side Status Glow strip lines -->
          <path d="M 22 55 L 22 85" stroke="${lidGlow}" stroke-width="3" stroke-linecap="round" />
          <path d="M 78 55 L 78 85" stroke="${lidGlow}" stroke-width="3" stroke-linecap="round" />
          
          <!-- Heavy-duty Base wheels -->
          <rect x="25" y="108" width="12" height="8" rx="3" fill="#334155" />
          <rect x="63" y="108" width="12" height="8" rx="3" fill="#334155" />
        </svg>
      `;
    }

    // Toast alerts helper system
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let icon = 'info';
      let borderCol = 'border-blue-500/30';
      let bgCol = 'bg-blue-950/80';
      let textCol = 'text-blue-200';
      
      if (type === 'success') {
        icon = 'check-circle-2';
        borderCol = 'border-green-500/30';
        bgCol = 'bg-green-950/80';
        textCol = 'text-green-200';
      } else if (type === 'warning') {
        icon = 'alert-triangle';
        borderCol = 'border-amber-500/30';
        bgCol = 'bg-amber-950/80';
        textCol = 'text-amber-200';
      }
      
      toast.className = `p-3 rounded-xl border ${borderCol} ${bgCol} ${textCol} backdrop-blur-md shadow-lg flex items-center gap-2 text-xs transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto`;
      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i>
        <span class="font-medium">${message}</span>
      `;
      
      container.appendChild(toast);
      lucide.createIcons();
      
      // Animate entry
      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 50);
      
      // Self-destruct logic
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // Format uptime helper
    function formatUptime(mins) {
      if (mins === 0) return '0m';
      const d = Math.floor(mins / (24 * 60));
      const h = Math.floor((mins % (24 * 60)) / 60);
      const m = Math.floor(mins % 60);
      return `${d}d ${h}h ${m}m`;
    }

    function navigate(view) {
      if (state.currentView !== view) {
        state.history.push(view);
        state.currentView = view;
        renderApp();
      }
    }

    function goBack() {
      if (state.history.length > 1) {
        state.history.pop();
        state.currentView = state.history[state.history.length - 1];
        renderApp();
      }
    }

    function changeHighlight(idx) {
      state.highlightIdx = idx;
      if (state.currentView === 'dashboard') {
        updateDashboardDynamic();
      } else {
        renderApp();
      }
    }

    function setRobotTab(tab) {
      state.activeRobotTab = tab;
      const listContainer = document.getElementById('robots-list-container');
      if (listContainer) {
        updateRobotsDynamic();
        // Re-active Tab Line Indicators
        const tabs = ['all', 'online', 'busy', 'offline', 'charging'];
        tabs.forEach((tName) => {
          const indicator = document.getElementById(`tab-indicator-${tName}`);
          if (indicator) {
            if (tName === tab) {
              indicator.classList.remove('hidden');
            } else {
              indicator.classList.add('hidden');
            }
          }
        });
      } else {
        renderApp();
      }
    }

    function setTelemetryTab(tab) {
      state.activeTelemetryTab = tab;
      renderApp();
    }

    // Open & Close dispatch modal handlers
    function openDispatchModal() {
      const modal = document.getElementById('dispatch-modal');
      const select = document.getElementById('dispatch-robot-select');
      
      select.innerHTML = state.robots.map(r => `
        <option value="${r.id}" ${r.status === 'offline' ? 'disabled' : ''}>
          ${r.id} (${r.status.toUpperCase()}) - Battery: ${Math.round(r.battery)}%
        </option>
      `).join('');

      modal.classList.remove('hidden');
    }

    function closeDispatchModal() {
      document.getElementById('dispatch-modal').classList.add('hidden');
    }

    function handleDispatchTask(e) {
      e.preventDefault();
      const robotId = document.getElementById('dispatch-robot-select').value;
      const action = document.querySelector('input[name="dispatch-action"]:checked').value;
      const destination = document.getElementById('dispatch-zone').value;
      const payload = parseFloat(document.getElementById('dispatch-payload').value) || 0;

      const robotIndex = state.robots.findIndex(r => r.id === robotId);
      if (robotIndex !== -1) {
        state.robots[robotIndex].status = 'busy';
        state.robots[robotIndex].activity = action;
        state.robots[robotIndex].location = destination;
        state.robots[robotIndex].payload = payload;
        
        state.tasks.inProgress += 1;
        state.metrics.active += 1;
        
        showToast(`Dispatched ${robotId} to ${destination} for ${action}!`, 'success');
        closeDispatchModal();
        
        if (state.currentView === 'dashboard') {
          updateDashboardDynamic();
        } else {
          renderApp();
        }
      }
    }

    // Simulation logic to update coordinates, battery values, dynamic logs
    setInterval(() => {
      state.robots = state.robots.map(r => {
        if (r.status === 'charging' || r.status === 'offline') {
          if (r.status === 'charging') {
            return { 
              ...r, 
              battery: Math.min(100, r.battery + 1.2), 
              uptimeMinutes: r.uptimeMinutes + 1 
            };
          }
          return r;
        }
        
        return {
          ...r,
          x: Math.max(10, Math.min(90, r.x + (Math.random() - 0.5) * 2)), 
          y: Math.max(10, Math.min(90, r.y + (Math.random() - 0.5) * 2)), 
          battery: Math.max(0, r.battery - (Math.random() * 0.2)),
          heading: (r.heading + (Math.random() - 0.5) * 12 + 360) % 360,
          coords: {
            x: r.coords.x + (Math.random() - 0.5) * 0.1,
            y: r.coords.y + (Math.random() - 0.5) * 0.1
          },
          voltage: Math.max(22.0, Math.min(26.0, r.voltage + (Math.random() - 0.5) * 0.05)),
          temp: Math.max(25, Math.min(45, r.temp + (Math.random() - 0.5) * 0.2)),
          uptimeMinutes: r.uptimeMinutes + 1
        };
      });

      if (Math.random() > 0.6) {
        state.metrics.battery = Math.max(10, Math.min(100, state.metrics.battery + (Math.random() > 0.5 ? 0.2 : -0.2)));
        const finishedTask = Math.random() > 0.8;
        if (finishedTask) {
          state.tasks.completed += 1;
          state.tasks.inProgress = Math.max(1, state.tasks.inProgress - 1);
          showToast("A scheduled delivery dispatch has completed successfully.", "success");
        }
      }

      // NO FLICKER FIX: Precise element-targeted DOM updates
      if (state.currentView === 'dashboard') {
        updateDashboardDynamic();
      } else if (state.currentView === 'robots') {
        updateRobotsDynamic();
      } else if (state.currentView === 'robot_details') {
        updateRobotDetailsDynamic();
      }
    }, 3000);

    function renderApp() {
      renderHeader();
      renderBottomNav();
      
      const mainContent = document.getElementById('main-content');
      
      if (state.currentView === 'dashboard') {
        renderDashboardSkeleton(mainContent);
      } else if (state.currentView === 'robots') {
        renderRobots(mainContent);
      } else if (state.currentView === 'robot_details') {
        renderRobotDetails(mainContent);
      } else if (state.currentView === 'settings') {
        renderSettings(mainContent);
      } else if (state.currentView === 'tasks') {
        renderTasks(mainContent);
      }
      
      lucide.createIcons();
    }

    function renderHeader() {
      const header = document.getElementById('app-header');
      if (state.currentView === 'dashboard' || state.currentView === 'settings' || state.currentView === 'tasks') {
        header.classList.remove('hidden');
        header.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600/15 flex items-center justify-center border border-blue-500/30">
              <i data-lucide="bot" class="text-blue-500 w-5.5 h-5.5"></i>
            </div>
            <div>
              <h1 class="text-lg font-extrabold tracking-wider text-white uppercase leading-none">NEXBOT</h1>
              <span class="text-[10px] text-gray-500 font-semibold uppercase tracking-wider">Fleet Management</span>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="relative cursor-pointer" onclick="showToast('Your fleet systems logs are clean. 12 background processes active.', 'success')">
              <i data-lucide="bell" class="w-5.5 h-5.5 text-gray-400"></i>
              <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-[#070b14]">12</span>
            </div>
            <div onclick="navigate('settings')" class="w-8 h-8 rounded-full bg-gray-600 overflow-hidden border border-gray-500 cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all flex items-center justify-center">
              <div class="w-full h-full bg-gradient-to-tr from-gray-500 to-gray-300 flex items-center justify-center">
                <i data-lucide="user" class="w-4 h-4 text-gray-100"></i>
              </div>
            </div>
          </div>
        `;
      } else {
        header.classList.add('hidden');
      }
    }

    function renderBottomNav() {
      const navs = ['dashboard', 'robots', 'tasks', 'settings'];
      navs.forEach(nav => {
        const btn = document.getElementById(`nav-${nav}`);
        if (btn) {
          if (state.currentView === nav) {
            btn.className = "flex-1 flex flex-col items-center justify-center gap-1 py-1.5 rounded-xl mb-1 mx-0.5 text-blue-500 bg-blue-900/20 transition-all-300";
          } else {

    function updateDashboardDynamic() {
      if (state.currentView !== 'dashboard') return;
      
      const highlightedRobot = state.robots[state.highlightIdx];

      const mapRobotsOverlay = document.getElementById('map-robots-overlay');
      if (mapRobotsOverlay) {
        mapRobotsOverlay.innerHTML = state.robots.map((robot, rIdx) => {
          const isCurrentHighlight = rIdx === state.highlightIdx;
          
          let glowColor = '';
          let iconColor = '';
          if (robot.status === 'online') {
            glowColor = 'bg-green-500/20 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.35)]';
            iconColor = 'text-green-400';
          } else if (robot.status === 'busy') {
            glowColor = 'bg-blue-500/20 border-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.35)]';
            iconColor = 'text-blue-400';
          } else if (robot.status === 'charging') {
            glowColor = 'bg-yellow-500/20 border-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.25)]';
            iconColor = 'text-yellow-400';
          } else {
            glowColor = 'bg-red-500/20 border-red-500 shadow-[0_0_12px_rgba(239,68,68,0.35)]';
            iconColor = 'text-red-400';
          }

          return `
            <div onclick="changeHighlight(${rIdx})" class="absolute flex flex-col items-center z-20 transition-all duration-1000 ease-linear cursor-pointer" style="top: ${robot.y}%; left: ${robot.x}%; transform: translate(-50%, -50%)">
              <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center ${glowColor} ${isCurrentHighlight ? 'ring-2 ring-white scale-110' : ''}">
                <i data-lucide="bot" class="w-3.5 h-3.5 ${iconColor}"></i>
                ${robot.status === 'offline' ? `<div class="absolute -right-1.5 -top-1 w-3.5 h-3.5 bg-[#0a101d] rounded-full border border-red-500 flex items-center justify-center"><i data-lucide="alert-triangle" class="w-2.5 h-2.5 text-red-500"></i></div>` : ''}

    // High fidelity dynamic bindings for telemetry updates on details page
    function updateRobotDetailsDynamic() {
      if (state.currentView !== 'robot_details') return;

      const highlightedRobot = state.robots[state.highlightIdx];
      const isCharging = highlightedRobot.status === 'charging';

      const detailsAvatar = document.getElementById('details-avatar');
      if (detailsAvatar) {
        detailsAvatar.innerHTML = getPremiumRobotSVG(highlightedRobot.status);
      }

      const detailsId = document.getElementById('details-id');
      if (detailsId) detailsId.textContent = highlightedRobot.id;

      const detailsStatusPill = document.getElementById('details-status-pill');
      if (detailsStatusPill) {
        detailsStatusPill.className = `flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[8px] border ${
          highlightedRobot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
          : highlightedRobot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
          : highlightedRobot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
          : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        detailsStatusPill.innerHTML = `
          <div class="w-1 h-1 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500' : highlightedRobot.status === 'busy' ? 'bg-blue-500' : highlightedRobot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></div>
          <span class="capitalize text-[8px] font-bold">${highlightedRobot.status}</span>
        `;
      }

      const detailsLocation = document.getElementById('details-location');
      if (detailsLocation) detailsLocation.textContent = highlightedRobot.location;

      const detailsUptime = document.getElementById('details-uptime');
      if (detailsUptime) detailsUptime.textContent = formatUptime(highlightedRobot.uptimeMinutes);

      const detailsBatteryText = document.getElementById('details-battery-text');
      if (detailsBatteryText) detailsBatteryText.textContent = `${Math.round(highlightedRobot.battery)}%`;

      const detailsBatteryBar = document.getElementById('details-battery-bar');
      if (detailsBatteryBar) {
        detailsBatteryBar.style.width = `${highlightedRobot.battery}%`;
        detailsBatteryBar.className = `h-full rounded-[1px] transition-all duration-500 ${highlightedRobot.battery > 20 ? 'bg-green-500' : 'bg-red-500'}`;
      }

      const detailsChargingText = document.getElementById('details-charging-text');
      if (detailsChargingText) {
        detailsChargingText.textContent = isCharging ? 'Charging...' : 'Not Charging';
        detailsChargingText.className = `text-[10px] font-semibold ${isCharging ? 'text-green-500 animate-pulse' : 'text-gray-400'}`;
      }

      const detailsBatteryIconZap = document.getElementById('details-battery-icon-zap');
      if (detailsBatteryIconZap) {
        detailsBatteryIconZap.style.display = isCharging ? 'block' : 'none';
      }

      if (state.activeTelemetryTab === 'Overview') {
        const detailsHeading = document.getElementById('details-heading');
        if (detailsHeading) detailsHeading.textContent = `${Math.round(highlightedRobot.heading)}° SE`;

        const detailsCoords = document.getElementById('details-coords');
        if (detailsCoords) {
          detailsCoords.innerHTML = `
            <span>X: ${highlightedRobot.coords.x.toFixed(2)} m</span>
            <span>Y: ${highlightedRobot.coords.y.toFixed(2)} m</span>
          `;
        }

        const detailsVoltage = document.getElementById('details-voltage');
        if (detailsVoltage) detailsVoltage.textContent = `${highlightedRobot.voltage.toFixed(1)} V`;

        const detailsTemp = document.getElementById('details-temp');
        if (detailsTemp) detailsTemp.textContent = `${highlightedRobot.temp.toFixed(1)}°C`;

        const detailsPayload = document.getElementById('details-payload');
        if (detailsPayload) detailsPayload.textContent = `${highlightedRobot.payload.toFixed(1)} kg`;

        const detailsBatteryCircle = document.getElementById('details-battery-circle');
        if (detailsBatteryCircle) {
          const offset = 251 - (highlightedRobot.battery / 100) * 251;
          detailsBatteryCircle.setAttribute('stroke-dashoffset', offset);
        }

        const detailsBatteryPercentInner = document.getElementById('details-battery-percent-inner');
        if (detailsBatteryPercentInner) {
          detailsBatteryPercentInner.textContent = `${Math.round(highlightedRobot.battery)}%`;
        }
      }
    }
