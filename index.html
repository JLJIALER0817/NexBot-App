  <style>
    /* Custom Scrollbar hide rules */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Smooth transition presets */
    .transition-all-300 {
      transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Animation helper for views changing */
    .animate-slide-in {
      animation: slideIn 250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Safe-area support for mobile devices */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }

    /* Radar Ping Wave Animation */
    @keyframes radar-ping {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }
    .radar-pulse {
      animation: radar-ping 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }

    /* Moving dash line animation */
    @keyframes dash-move {
      to {
        stroke-dashoffset: -20;
      }
    }
    .animate-dash {
      stroke-dasharray: 6, 4;
      animation: dash-move 1.2s linear infinite;
    }

    /* High-fidelity CSS overrides for ultra-small viewports (like iPhone SE/320px width) */
    @media (max-width: 380px) {
      .mobile-card-padding {
        padding: 0.75rem !important;
      }
      .mobile-gap-reduction {
        gap: 0.5rem !important;
      }
      .mobile-text-shrink {

        font-size: 10px !important;
      }

      }

        padding-top: 1.5rem;
      }
    }

    /* Dashboard metric cards */
    .dashboard-metrics {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .dashboard-metrics > div {
      scroll-snap-align: start;
    }

    @media (min-width: 768px) {
      .dashboard-metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        overflow: visible;
      }
    }

    @media (min-width: 1024px) {
      .dashboard-metrics {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (min-width: 768px) {
      .dashboard-metrics > div {
        min-width: 0 !important;
      }
    }

    .dashboard-map-area {
      height: 16rem;
    }

    @media (min-width: 768px) {
      .dashboard-map-area {
        height: 20rem;
      }
    }

    @media (min-width: 1024px) {
      .dashboard-map-area {
        height: 24rem;
      }
    }

    @media (min-width: 1280px) {
      .dashboard-layout-split {
        display: grid;
        grid-template-columns: 1fr minmax(320px, 420px);
        gap: 1.5rem;
        align-items: start;
      }
    }

    /* Robots list grid on tablet+ */
    @media (min-width: 768px) {
      #robots-list-container.robots-list-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        align-content: start;
      }
    }

    @media (min-width: 1280px) {

      }
    }

    // Toast alerts helper system
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let icon = 'info';
      let borderCol = 'border-blue-500/30';
      let bgCol = 'bg-blue-950/80';
      let textCol = 'text-blue-200';
      
      if (type === 'success') {
        icon = 'check-circle-2';
        borderCol = 'border-green-500/30';
        bgCol = 'bg-green-950/80';
        textCol = 'text-green-200';
      } else if (type === 'warning') {
        icon = 'alert-triangle';
        borderCol = 'border-amber-500/30';
        bgCol = 'bg-amber-950/80';
        textCol = 'text-amber-200';
      }
      
      toast.className = `p-3 rounded-xl border ${borderCol} ${bgCol} ${textCol} backdrop-blur-md shadow-lg flex items-center gap-2 text-xs transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto z-50`;
      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i>
        <span class="font-medium">${message}</span>
      `;
      
      container.appendChild(toast);
      lucide.createIcons();
      
      // Animate entry
      setTimeout(() => {

    // Format uptime helper
    function formatUptime(mins) {
      if (mins === 0) return '0m';
      const d = Math.floor(mins / (24 * 60));
      const h = Math.floor((mins % (24 * 60)) / 60);
      const m = Math.floor(mins % 60);
      return `${d}d ${h}h ${m}m`;
    }

    function parseEtaToSeconds(eta) {
      if (!eta || typeof eta !== 'string') return 120;
      const match = eta.match(/(\d+)\s*min/i);
      return match ? parseInt(match[1], 10) * 60 : 120;
    }

    function formatTime12h(date) {
      return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    /** Parses "02:45 PM" / "11:30 AM" against today's calendar date. */
    function parseMeridiemTimeToday(timeStr) {
      if (!timeStr || typeof timeStr !== 'string') return null;
      const m = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const ap = m[3].toUpperCase();
      if (ap === 'PM' && h !== 12) h += 12;
      if (ap === 'AM' && h === 12) h = 0;
      const d = new Date();
      d.setHours(h, min, 0, 0);
      return d;
    }

    function addMinutes(date, minutes) {
      return new Date(date.getTime() + minutes * 60 * 1000);
    }

    function getLiveCameraTimelineBase(task) {
      const parsed = parseMeridiemTimeToday(task.time);
      if (parsed) return parsed;
      return new Date(Date.now() - 12 * 60 * 1000);
    }

      const rect = mapContainer.getBoundingClientRect();

      const y = ((e.clientY - rect.top - state.mapPanY) / state.mapZoom / rect.height) * 100;

      // Draw custom route dynamically
      state.dispatchTarget = { x, y };
      state.isDispatchMode = false;

      // Update R2-03 trajectory simulation
      const rIdx = state.robots.findIndex(r => r.id === 'R2-03');
      if (rIdx !== -1) {
        const robot = state.robots[rIdx];
        showToast('In calculating the latest safe obstacle avoidance path...', 'info');
        
        // Push destination point
        const routePath = document.getElementById('dynamic-dispatch-route');
        if (routePath) {

          routePath.classList.remove('hidden');
        }

        setTimeout(() => {
          showToast('Nexbot has started and is en route to the specified destination....', 'success');
          
          let steps = 0;
          const startX = robot.x;
          const startY = robot.y;
          const interval = setInterval(() => {
            if (state.isNavigationPaused) return; // If paused, hold position
            steps++;
            const t = steps / 20;
            robot.x = startX + (x - startX) * t;
            robot.y = startY + (y - startY) * t;
            robot.heading = Math.atan2(y - startY, x - startX) * (180 / Math.PI);
            
            // Redraw
            renderLiveMapOverlayRobots();
            
            if (steps >= 20) {
              clearInterval(interval);
              robot.location = "First Floor â€¢ Zone X";

              routePath.classList.add('hidden');
              showToast('R2-03 has safely arrived at the target area!', 'success');
            }

    let audioWaveAnimFrame = null;

      const canvas = document.getElementById('audiowave-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = 64;

      let phase = 0;
      function draw() {
        if (!document.getElementById('calling-simulation-modal')) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        
        for (let x = 0; x < canvas.width; x++) {
          const y = canvas.height / 2 + Math.sin(x * 0.04 + phase) * Math.cos(x * 0.01 + phase) * 16;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        phase += 0.08;
        audioWaveAnimFrame = requestAnimationFrame(draw);
      }
      draw();
    }

    function initLidarRadarCanvas() {
      const canvas = document.getElementById('lidar-radar-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = 300;
      canvas.height = 300;

      let angle = 0;
      // Generate some dummy static obstacle points
      const points = Array.from({ length: 15 }, () => ({
        distance: 50 + Math.random() * 80,
        angle: Math.random() * Math.PI * 2,
        opacity: Math.random()
      }));

      function render() {
        if (!document.getElementById('lidar-radar-modal')) return;
        ctx.clearRect(0, 0, 300, 300);
        const cx = 150;
        const cy = 150;
        const r = 130;

        // Draw concentric range circles
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
          ctx.beginPath();
          ctx.arc(cx, cy, (r / 3) * i, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Draw cross lines
        ctx.beginPath();
        ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
        ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
        ctx.stroke();

        // Draw scanning laser beam line
        const sweepX = cx + Math.cos(angle) * r;
        const sweepY = cy + Math.sin(angle) * r;
        
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
        grad.addColorStop(1, 'rgba(59, 130, 246, 0)');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, angle - 0.25, angle);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(sweepX, sweepY);
        ctx.stroke();

        // Draw dynamic LiDAR obstacles points
        points.forEach(p => {
          const px = cx + Math.cos(p.angle) * p.distance;
          const py = cy + Math.sin(p.angle) * p.distance;
          
          ctx.fillStyle = `rgba(34, 197, 94, ${p.opacity})`;
          ctx.beginPath();
          ctx.arc(px, py, 3.5, 0, Math.PI * 2);
          ctx.fill();

          // Pulse some fade values
          p.opacity -= 0.01;
          if (p.opacity <= 0) {
            p.opacity = 1;
            p.distance = 50 + Math.random() * 80;
            p.angle = Math.random() * Math.PI * 2;
          }
        });

        angle = (angle + 0.03) % (Math.PI * 2);
        requestAnimationFrame(render);
      }
      render();
    }

    function updateDashboardDynamic() {
      if (state.currentView !== 'dashboard') return;
      
      const highlightedRobot = state.robots[state.highlightIdx];

      const mapRobotsOverlay = document.getElementById('map-robots-overlay');
      if (mapRobotsOverlay) {
        mapRobotsOverlay.innerHTML = state.robots.map((robot, rIdx) => {
          const isCurrentHighlight = rIdx === state.highlightIdx;
          
          let glowColor = '';
          let iconColor = '';
          if (robot.status === 'online') {
            glowColor = 'bg-green-500/20 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.35)]';
            iconColor = 'text-green-400';
          } else if (robot.status === 'busy') {
            glowColor = 'bg-blue-500/20 border-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.35)]';
            iconColor = 'text-blue-400';
          } else if (robot.status === 'charging') {
            glowColor = 'bg-yellow-500/20 border-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.25)]';
            iconColor = 'text-yellow-400';
          } else {
            glowColor = 'bg-red-500/20 border-red-500 shadow-[0_0_12px_rgba(239,68,68,0.35)]';
            iconColor = 'text-red-400';
          }

          return `
            <div onclick="changeHighlight(${rIdx})" class="absolute flex flex-col items-center z-20 transition-all duration-1000 ease-linear cursor-pointer" style="top: ${robot.y}%; left: ${robot.x}%; transform: translate(-50%, -50%)">
              <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center ${glowColor} ${isCurrentHighlight ? 'ring-2 ring-white scale-110' : ''}">
                <i data-lucide="bot" class="w-3.5 h-3.5 ${iconColor}"></i>
                ${robot.status === 'offline' ? `<div class="absolute -right-1.5 -top-1 w-3.5 h-3.5 bg-[#0a101d] rounded-full border border-red-500 flex items-center justify-center"><i data-lucide="alert-triangle" class="w-2.5 h-2.5 text-red-500"></i></div>` : ''}
              </div>
              <span class="text-[8px] font-extrabold mt-0.5 bg-[#0a101d]/90 px-1 rounded transition-colors ${iconColor}">${robot.id}</span>
            </div>
          `;
        }).join('');
        
        lucide.createIcons({ node: mapRobotsOverlay });
      }

      const highlightAvatar = document.getElementById('highlight-avatar');
      if (highlightAvatar) {
        highlightAvatar.innerHTML = getPremiumRobotSVG(highlightedRobot.status);
      }

      const highlightId = document.getElementById('highlight-id');
      if (highlightId) highlightId.textContent = highlightedRobot.id;

      const highlightStatusPill = document.getElementById('highlight-status-pill');
      if (highlightStatusPill) {
        highlightStatusPill.className = `flex items-center gap-1.5 px-2 py-0.5 rounded text-[8px] border transition-colors ${
          highlightedRobot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
          : highlightedRobot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
          : highlightedRobot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
          : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        highlightStatusPill.innerHTML = `
          <div class="w-1.5 h-1.5 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500' : highlightedRobot.status === 'busy' ? 'bg-blue-500' : highlightedRobot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></div>
          <span class="capitalize text-[8px] font-bold">${highlightedRobot.status}</span>
        `;
      }

      const highlightBatteryPercent = document.getElementById('highlight-battery-percent');
      if (highlightBatteryPercent) highlightBatteryPercent.textContent = `${Math.round(highlightedRobot.battery)}%`;

      const highlightBatteryBar = document.getElementById('highlight-battery-bar');
      if (highlightBatteryBar) {
        highlightBatteryBar.className = `h-full rounded-full transition-all duration-500 ${highlightedRobot.battery > 20 ? 'bg-green-500' : 'bg-red-500'}`;
        highlightBatteryBar.style.width = `${highlightedRobot.battery}%`;

      const highlightLocation = document.getElementById('highlight-location');
      if (highlightLocation) highlightLocation.textContent = highlightedRobot.location;

      const highlightActivity = document.getElementById('highlight-activity');
      if (highlightActivity) highlightActivity.textContent = highlightedRobot.activity;

      const highlightCameraLive = document.getElementById('highlight-camera-live');
      if (highlightCameraLive) {
        highlightCameraLive.style.opacity = highlightedRobot.status === 'offline' ? '0.2' : '0.9';
      }

      const highlightCameraStatus = document.getElementById('highlight-camera-status');
      if (highlightCameraStatus) {
        highlightCameraStatus.innerHTML = `
          <div class="w-1.5 h-1.5 rounded-full ${highlightedRobot.status === 'offline' ? 'bg-red-500' : 'bg-green-500 animate-pulse'}"></div>

        `;
      }

        filtered = state.robots.filter(r => r.status === 'busy');

    // High fidelity dynamic bindings for telemetry updates on details page
    function updateRobotDetailsDynamic() {
      if (state.currentView !== 'robot_details') return;

      const highlightedRobot = state.robots[state.highlightIdx];
      const isCharging = highlightedRobot.status === 'charging';

      const detailsAvatar = document.getElementById('details-avatar');
      if (detailsAvatar) {
        detailsAvatar.innerHTML = getPremiumRobotSVG(highlightedRobot.status);
      }

      const detailsId = document.getElementById('details-id');
      if (detailsId) detailsId.textContent = highlightedRobot.id;

      const detailsStatusPill = document.getElementById('details-status-pill');
      if (detailsStatusPill) {
        detailsStatusPill.className = `flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[8px] border ${
          highlightedRobot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
          : highlightedRobot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
          : highlightedRobot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
          : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        detailsStatusPill.innerHTML = `
          <div class="w-1.5 h-1.5 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500' : highlightedRobot.status === 'busy' ? 'bg-blue-500' : highlightedRobot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></div>
          <span class="capitalize text-[8px] font-bold">${highlightedRobot.status}</span>
        `;
      }

      const detailsLocation = document.getElementById('details-location');
      if (detailsLocation) detailsLocation.textContent = highlightedRobot.location;

      const detailsUptime = document.getElementById('details-uptime');
      if (detailsUptime) detailsUptime.textContent = formatUptime(highlightedRobot.uptimeMinutes);

      const detailsBatteryText = document.getElementById('details-battery-text');
      if (detailsBatteryText) detailsBatteryText.textContent = `${Math.round(highlightedRobot.battery)}%`;

      const detailsBatteryBar = document.getElementById('details-battery-bar');
      if (detailsBatteryBar) {
        detailsBatteryBar.style.width = `${highlightedRobot.battery}%`;
        detailsBatteryBar.className = `h-full rounded-[1px] transition-all duration-500 ${highlightedRobot.battery > 20 ? 'bg-green-500' : 'bg-red-500'}`;
      }

      const detailsChargingText = document.getElementById('details-charging-text');
      if (detailsChargingText) {
        detailsChargingText.textContent = isCharging ? 'Charging...' : 'Not Charging';
        detailsChargingText.className = `text-[10px] font-semibold ${isCharging ? 'text-green-500 animate-pulse' : 'text-gray-400'}`;
      }

      const detailsBatteryIconZap = document.getElementById('details-battery-icon-zap');
      if (detailsBatteryIconZap) {
        detailsBatteryIconZap.style.display = isCharging ? 'block' : 'none';
      }

      if (state.activeTelemetryTab === 'Overview') {
        const detailsHeading = document.getElementById('details-heading');
        if (detailsHeading) detailsHeading.textContent = `${Math.round(highlightedRobot.heading)}Â° SE`;

        const detailsCoords = document.getElementById('details-coords');
        if (detailsCoords) {
          detailsCoords.innerHTML = `
            <span>X: ${highlightedRobot.coords.x.toFixed(2)} m</span>
            <span>Y: ${highlightedRobot.coords.y.toFixed(2)} m</span>
          `;
        }

        const detailsVoltage = document.getElementById('details-voltage');
        if (detailsVoltage) detailsVoltage.textContent = `${highlightedRobot.voltage.toFixed(1)} V`;

        const detailsTemp = document.getElementById('details-temp');
        if (detailsTemp) detailsTemp.textContent = `${highlightedRobot.temp.toFixed(1)}Â°C`;

        const detailsPayload = document.getElementById('details-payload');
        if (detailsPayload) detailsPayload.textContent = `${highlightedRobot.payload.toFixed(1)} kg`;

        const detailsBatteryCircle = document.getElementById('details-battery-circle');
        if (detailsBatteryCircle) {
          const offset = 251 - (highlightedRobot.battery / 100) * 251;
          detailsBatteryCircle.setAttribute('stroke-dashoffset', offset);
        }

        const detailsBatteryPercentInner = document.getElementById('details-battery-percent-inner');
        if (detailsBatteryPercentInner) {
          detailsBatteryPercentInner.textContent = `${Math.round(highlightedRobot.battery)}%`;
        }
      }
    }

    function updateLiveCameraDynamic() {
      if (state.currentView !== 'live_camera') return;

      const activeTask = state.taskItems.find(t => t.id === state.selectedTaskId) || state.taskItems[0];
      const robot = state.robots.find(r => r.id === activeTask.robot) || state.robots[0];
      const destLabel = activeTask.to || 'Destination';
      const deliveryLine = `${activeTask.type === 'Room Service' ? 'Delivering' : activeTask.type} to ${destLabel}`;

      const lcRobotId = document.getElementById('lc-robot-id');
      if (lcRobotId) lcRobotId.textContent = robot.id;

      const pill = document.getElementById('lc-status-pill');
      if (pill) {
        const online = robot.status !== 'offline';
        pill.className = `flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[8px] border ${
          online ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        pill.innerHTML = `
          <span class="w-1.5 h-1.5 rounded-full ${online ? 'bg-green-500' : 'bg-red-500'}"></span>
          <span class="font-bold capitalize">${online ? 'Online' : 'Offline'}</span>
        `;
      }

      const taskLine = document.getElementById('lc-task-line');
      if (taskLine) taskLine.textContent = deliveryLine;

      const timelineBase = getLiveCameraTimelineBase(activeTask);
      const pickupAt = addMinutes(timelineBase, 3);
      const enRouteAt = addMinutes(timelineBase, 4);
      const pickupLabel = document.getElementById('lc-event-pickup');
      if (pickupLabel) {
        const from = activeTask.from || 'pickup point';
        pickupLabel.textContent = `Picked up from ${from}`;
      }
      const pickupTimeEl = document.getElementById('lc-event-pickup-time');
      if (pickupTimeEl) pickupTimeEl.textContent = formatTime12h(pickupAt);
      const enRouteTimeEl = document.getElementById('lc-event-enroute-time');
      if (enRouteTimeEl) enRouteTimeEl.textContent = formatTime12h(enRouteAt);

      const bat = document.getElementById('lc-battery-pct');
      if (bat) bat.textContent = `${Math.round(robot.battery)}%`;

      const batIcon = document.getElementById('lc-battery-icon');
      if (batIcon) {
        const b = Math.round(robot.battery);
        const iconName = b > 75 ? 'battery-full' : b > 40 ? 'battery-medium' : b > 15 ? 'battery-low' : 'battery-warning';
        batIcon.setAttribute('data-lucide', iconName);
        batIcon.className = `w-5 h-5 ${b > 20 ? 'text-green-500' : 'text-red-500'}`;
        lucide.createIcons({ node: batIcon });
      }

      const speed = state.liveCameraSpeed;
      const speedEl = document.getElementById('lc-speed');
      if (speedEl) speedEl.textContent = `${speed.toFixed(1)} m/s`;
      const speedSub = document.getElementById('lc-speed-sub');
      if (speedSub) {
        if (speed < 0.55) speedSub.textContent = 'Slow';
        else if (speed > 1.05) speedSub.textContent = 'Fast';
        else speedSub.textContent = 'Normal';
      }

      const motorTemp = Math.round(robot.temp + 10);
      const tempEl = document.getElementById('lc-temp');
      if (tempEl) {
        tempEl.textContent = `${motorTemp}Â°C`;
        tempEl.className = `text-lg font-bold leading-tight mt-0.5 ${motorTemp > 48 ? 'text-amber-400' : 'text-green-400'}`;
      }
      const tempSub = document.getElementById('lc-temp-sub');
      if (tempSub) tempSub.textContent = motorTemp > 48 ? 'Elevated' : 'Normal';

      const sig = Math.round(state.liveCameraSignalDbm);
      const sigEl = document.getElementById('lc-signal');
      if (sigEl) sigEl.textContent = `${sig} dBm`;
      let sigLabel = 'Fair';
      let sigClass = 'text-amber-400';
      if (sig >= -55) { sigLabel = 'Excellent'; sigClass = 'text-green-400'; }
      else if (sig >= -70) { sigLabel = 'Good'; sigClass = 'text-green-400'; }
      const sigSub = document.getElementById('lc-signal-sub');
      if (sigSub) {
        sigSub.textContent = sigLabel;
        sigSub.className = `text-[9px] font-semibold ${sigClass}`;
      }

      const trayMain = document.getElementById('lc-tray');
      const traySub = document.getElementById('lc-tray-sub');
      const heavyLoad = robot.payload > 14;
      if (trayMain) {
        trayMain.textContent = heavyLoad ? 'Watch' : 'Stable';
        trayMain.className = `text-lg font-bold leading-tight mt-0.5 ${heavyLoad ? 'text-amber-400' : 'text-green-400'}`;
      }
      if (traySub) traySub.textContent = heavyLoad ? 'Heavy load' : 'Good';

      const motions = ['Moving Forward', 'Turning', 'Approaching elevator', 'Cruising'];
      const motionEl = document.getElementById('lc-motion-pill');
      if (motionEl) {
        const idx = Math.floor(Date.now() / 9000) % motions.length;
        motionEl.textContent = motions[idx];
      }

      const arrow = document.getElementById('lc-minimap-arrow');
      if (arrow) {
        arrow.setAttribute('transform', `rotate(${robot.heading} 20 20)`);
      }

      const etaSec = state.liveCameraEtaSeconds;
      const arrivingText = document.getElementById('lc-event-arriving');
      if (arrivingText) {
        if (etaSec <= 0) arrivingText.textContent = 'Arrived at destination';
        else if (etaSec >= 60) arrivingText.textContent = `Arriving in ${Math.ceil(etaSec / 60)} min`;
        else arrivingText.textContent = `Arriving in ${etaSec}s`;
      }

      const arrivalAt = new Date(Date.now() + etaSec * 1000);
      const expectedAt = etaSec <= 0 ? new Date() : new Date(Date.now() + etaSec * 1000 + 2 * 60 * 1000);
      const arrivingTime = document.getElementById('lc-event-arriving-time');
      if (arrivingTime) arrivingTime.textContent = formatTime12h(arrivalAt);

      const expectedTimeEl = document.getElementById('lc-event-expected-time');
      if (expectedTimeEl) expectedTimeEl.textContent = formatTime12h(expectedAt);

      const enroute = document.getElementById('lc-event-enroute');
      if (enroute) enroute.textContent = `En route to ${destLabel}`;
    }

            <!-- BOTTOM FLOATING BAR (Interactive Controls Cards & Bottom Tab Nav) -->

              </div>

              <!-- Floating Selected Robot Details Panel (Card floats on map) -->
              <div class="bg-[#121929]/95 backdrop-blur-md border border-[#1b253b] mx-4 my-1.5 p-4 rounded-3xl shadow-[0_15px_30px_rgba(0,0,0,0.5)]" id="selected-robot-card-panel">

              </div>

              <!-- Floating Compact Navigation Controls Panel -->
              <div class="bg-[#121929]/95 backdrop-blur-md border border-[#1b253b] mx-4 mb-3 p-3.5 rounded-3xl shadow-[0_15px_30px_rgba(0,0,0,0.5)]">
                <h3 class="text-gray-400 font-extrabold text-[9px] uppercase tracking-wider mb-2.5 px-1 flex items-center gap-1">
                  <span class="w-1 h-2 bg-blue-500 rounded-full"></span> Navigation Controls

                <div class="grid grid-cols-5 gap-1.5 text-center font-semibold">
                  <button onclick="triggerDispatchMode()" class="flex flex-col items-center gap-1">
                    <div class="w-11 h-11 bg-white/5 border border-slate-800 rounded-2xl flex items-center justify-center text-gray-300 hover:text-white transition-colors active:scale-95 shrink-0">

                  <button onclick="togglePauseNavigation()" id="pause-nav-btn" class="flex flex-col items-center gap-1">

                  <button onclick="triggerReturnToBase()" class="flex flex-col items-center gap-1">
                    <div class="w-11 h-11 bg-white/5 border border-slate-800 rounded-2xl flex items-center justify-center text-gray-300 hover:text-white transition-colors active:scale-95 shrink-0">
                      <i data-lucide="home" class="w-5.5 h-5.5 text-indigo-400"></i>
                    </div>
                    <span class="text-[9px] text-gray-400 font-medium">Return</span>
                  </button>

                  <button onclick="openLidarDiagnostic()" class="flex flex-col items-center gap-1">
                    <div class="w-11 h-11 bg-white/5 border border-slate-800 rounded-2xl flex items-center justify-center text-gray-300 hover:text-white transition-colors active:scale-95 shrink-0">
                      <i data-lucide="compass" class="w-5.5 h-5.5 text-orange-500 animate-spin" style="animation-duration: 4s;"></i>

              </div>

              <!-- Integrated App Navigation Bar -->
              <nav class="bg-[#070b14]/90 backdrop-blur-md border-t border-slate-900/60 px-1 pt-1.5 flex justify-between items-end shrink-0">
                <button onclick="navigate('dashboard')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 text-gray-500 hover:text-gray-300">
                  <i data-lucide="home" class="w-4.5 h-4.5"></i>
                  <span class="text-[8.5px] font-medium whitespace-nowrap">Dashboard</span>
                </button>
                <button onclick="navigate('robots')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 text-blue-500 bg-blue-900/20 rounded-xl mb-0.5">
                  <i data-lucide="bot" class="w-4.5 h-4.5"></i>

                <button onclick="openDispatchModal()" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 text-gray-500">
                  <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-[0_2px_10px_rgba(37,99,235,0.4)]">

                </button>
              </nav>

            </div>
          </div>

        </div>
      `;

      // Complete layout rendering
      renderLiveMapPanel();
      renderLiveMapOverlayRobots();
    }

    // Set Map into Navigation dispatch destination placement state
    function triggerDispatchMode() {
      state.isDispatchMode = true;
      const banner = document.getElementById('dispatch-mode-banner');
      if (banner) banner.classList.remove('hidden');
      showToast('Target dispatch mode is enabled. Click anywhere on the map to plan and dispatch routes.', 'info');
    }

    // Move Selected Robot back to charging base station
    function triggerReturnToBase() {
      const activeBot = state.robots[state.highlightIdx];
      showToast('Calculating return route... Charging dock locked.', 'info');

      // Base coordinates on map
      const baseX = 70;
      const baseY = 26;

      setTimeout(() => {
        let steps = 0;
        const startX = activeBot.x;
        const startY = activeBot.y;
        
        const interval = setInterval(() => {
          if (state.isNavigationPaused) return;
          steps++;
          const t = steps / 20;
          activeBot.x = startX + (baseX - startX) * t;
          activeBot.y = startY + (baseY - startY) * t;
          activeBot.heading = Math.atan2(baseY - startY, baseX - startX) * (180 / Math.PI);
          
          renderLiveMapOverlayRobots();
          
          if (steps >= 20) {
            clearInterval(interval);
            activeBot.status = "charging";
            activeBot.activity = "Charging";
            activeBot.location = "1F - Charging Station";
            renderLiveMapPanel();
            renderLiveMapOverlayRobots();
            showToast('R2-03 has safely returned and docked to the charging dock.', 'success');
          }
        }, 1500 / 20);
      }, 1000);
    }

    // Renders Selected Robot Card Panel perfectly matching and robust responsive for small devices
    function renderLiveMapPanel() {
      const activeBot = state.robots[state.highlightIdx];
      const panel = document.getElementById('selected-robot-card-panel');
      if (!panel) return;

      const statusCol = activeBot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
                       : activeBot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
                       : activeBot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
                       : 'bg-red-500/10 text-red-400 border-red-500/20';

      panel.innerHTML = `
        <div class="flex items-center justify-between mb-3 shrink-0">
          <span class="text-gray-400 font-extrabold text-[10px] uppercase tracking-wider flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)] animate-pulse"></span> 
            Selected Robot
          </span>
          <i data-lucide="chevron-up" class="w-4 h-4 text-gray-500"></i>
        </div>

        <div class="flex flex-wrap sm:flex-nowrap items-center gap-3 sm:gap-4">
          <!-- Left Content: Robot Avatar & Info (min-w prevents squishing on small phones) -->
          <div class="flex items-center gap-3 flex-1 min-w-[200px]">
            <!-- Robot premium render SVG -->
            <div class="w-14 h-16 shrink-0 drop-shadow-md">
              ${getPremiumRobotSVG(activeBot.status)}
            </div>

            <div class="flex-1 space-y-1.5 text-xs min-w-0">
              <div class="flex items-center gap-2 mb-1.5">
                <h2 class="text-[15px] font-black text-white leading-none">${activeBot.id}</h2>
                <span class="flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[9px] border ${statusCol}">
                  <span class="w-1 h-1 rounded-full ${activeBot.status === 'online' ? 'bg-green-500' : activeBot.status === 'busy' ? 'bg-blue-500' : activeBot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></span>
                  <span class="capitalize font-bold text-[9px]">${activeBot.status}</span>
                </span>
              </div>

              <!-- Metrics Info Grid -->
              <div class="grid grid-cols-[55px_1fr] gap-x-1.5 gap-y-1 font-bold text-[10px] text-gray-400">
                <span>Status</span>
                <span class="text-gray-200 truncate">Online</span>
                
                <span>En Route</span>
                <span class="text-gray-200 truncate" title="${activeBot.location}">to Room 1205 (12F)</span>

                <span>Battery</span>
                <div class="flex items-center gap-1.5 pr-1">
                  <span class="text-gray-200 font-mono text-[9px] w-6 shrink-0">${Math.round(activeBot.battery)}%</span>
                  <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-green-500 rounded-full transition-all duration-500" style="width: ${activeBot.battery}%"></div>
                  </div>
                </div>

                <span>ETA</span>
                <span class="text-[#10b981] font-black">2 min</span>
              </div>
            </div>
          </div>

          <!-- Action Buttons Wrapper (Adapts to full-width row on mobile, column on tablet/larger) -->
          <div class="flex flex-row sm:flex-col w-full sm:w-[110px] gap-2 shrink-0 mt-1 sm:mt-0">
            <button onclick="recenterMapViewOnRobot('${activeBot.id}')" class="flex-1 sm:flex-none px-3.5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-[11px] font-black flex items-center justify-center gap-1.5 shadow-[0_4px_12px_rgba(37,99,235,0.25)] active:scale-95 transition-all">
              <i data-lucide="navigation" class="w-3.5 h-3.5"></i>
              <span>Re-center</span>
            </button>
            <button onclick="triggerDispatchMode()" class="flex-1 sm:flex-none px-3.5 py-2.5 bg-transparent border border-slate-700 hover:bg-[#1f2b42] text-gray-300 rounded-xl text-[11px] font-black flex items-center justify-center gap-1.5 active:scale-95 transition-all">
              <i data-lucide="map-pin" class="w-3.5 h-3.5 text-gray-400"></i>
              <span>Waypoint</span>
            </button>
          </div>
        </div>
      `;
      lucide.createIcons({ node: panel });
    }

    // Pans and scales viewport instantly to the selected robot coordinates
    function recenterMapViewOnRobot(robotId) {
      const robot = state.robots.find(r => r.id === robotId);
      if (robot) {
        state.mapZoom = 1.6;
        const container = document.getElementById('navigation-map-wrapper');
        if (container) {
          const w = container.clientWidth;
          const h = container.clientHeight;
          state.mapPanX = -(robot.x - 50) * 0.01 * w * state.mapZoom;
          state.mapPanY = -(robot.y - 50) * 0.01 * h * state.mapZoom;
          applyMapTransform();
          showToast(`The focus has been locked on the robot. ${robot.id}`, 'success');
        }
      }
    }

    // Redraws robot markers onto the live blueprint map inside live map view
    function renderLiveMapOverlayRobots() {
      const overlay = document.getElementById('live-map-robots-container');
      if (!overlay) return;

      overlay.innerHTML = state.robots.map((robot, rIdx) => {
        const isCurrentHighlight = rIdx === state.highlightIdx;
        
        let glowColor = '';
        let iconColor = '';
        if (robot.status === 'online') {
          glowColor = 'bg-green-500/20 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.35)]';
          iconColor = 'text-green-400';
        } else if (robot.status === 'busy') {
          glowColor = 'bg-blue-500/20 border-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.35)]';
          iconColor = 'text-blue-400';
        } else if (robot.status === 'charging') {
          glowColor = 'bg-yellow-500/20 border-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.25)]';
          iconColor = 'text-yellow-400';
        } else {
          glowColor = 'bg-red-500/20 border-red-500 shadow-[0_0_12px_rgba(239,68,68,0.35)]';
          iconColor = 'text-red-400';
        }

        return `
          <div onclick="changeHighlight(${rIdx})" class="absolute flex flex-col items-center transition-all duration-1000 ease-linear cursor-pointer pointer-events-auto" style="top: ${robot.y}%; left: ${robot.x}%; transform: translate(-50%, -50%)">
            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center ${glowColor} ${isCurrentHighlight ? 'ring-2 ring-white scale-110' : ''}">
              <i data-lucide="bot" class="w-4 h-4 ${iconColor}"></i>
              ${robot.status === 'offline' ? `<div class="absolute -right-2 -top-1 w-4.5 h-4.5 bg-[#0a101d] rounded-full border border-red-500 flex items-center justify-center shadow-lg"><i data-lucide="alert-triangle" class="w-3 h-3 text-red-500"></i></div>` : ''}
            </div>
            <span class="text-[8px] font-extrabold mt-1 bg-[#070b14]/95 border border-slate-800/80 px-1 rounded transition-colors ${iconColor}">${robot.id}</span>
          </div>
        `;
      }).join('');
      
      lucide.createIcons({ node: overlay });
    }

    // Drag-to-pan handlers for architectural map inside live map view
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragDistance = 0;

    function startMapDragging(e) {
      isDragging = true;
      dragDistance = 0;
      dragStartX = e.clientX - state.mapPanX;
      dragStartY = e.clientY - state.mapPanY;
    }

    function onMapDragging(e) {
      if (!isDragging) return;
      dragDistance += Math.abs(e.movementX || 0) + Math.abs(e.movementY || 0);
      state.mapPanX = e.clientX - dragStartX;
      state.mapPanY = e.clientY - dragStartY;
      applyMapTransform();
    }

    function startMapDraggingTouch(e) {
      isDragging = true;
      dragDistance = 0;
      const touch = e.touches[0];
      dragStartX = touch.clientX - state.mapPanX;
      dragStartY = touch.clientY - state.mapPanY;
    }

    function onMapDraggingTouch(e) {
      if (!isDragging) return;
      const touch = e.touches[0];
      state.mapPanX = touch.clientX - dragStartX;
      state.mapPanY = touch.clientY - dragStartY;
      applyMapTransform();
    }

    function stopMapDragging() {
      isDragging = false;
    }

    function renderSettings(container) {
      const accountItems = [
        { icon: 'user', title: 'Profile', subtitle: 'View and edit your profile information', toast: 'Mock profile details configured.' },
        { icon: 'settings', title: 'Settings', subtitle: 'App preferences and configurations', toast: 'App preferences loaded.' },
        { icon: 'bell', title: 'Notifications', subtitle: 'Manage your notification preferences', toast: 'Notification schedules active.' },
        { icon: 'shield', title: 'Security', subtitle: 'Password, 2FA, and security settings', toast: 'Security settings loaded.' },
      ];
      const fleetItems = [
        { icon: 'bot', title: 'Robots', subtitle: 'Manage and configure your robots', toast: 'Opening robot fleet manager.' },
        { icon: 'building-2', title: 'Locations', subtitle: 'Manage your buildings and floors', toast: 'Locations loaded.' },
        { icon: 'map-pin', title: 'Geofences', subtitle: 'Set up virtual boundaries', toast: 'Loaded geofence profiles (Read only).' },
        { icon: 'calendar', title: 'Schedules', subtitle: 'Manage cleaning and delivery schedules', toast: 'Saved schedule backups online.' },
        { icon: 'clipboard-list', title: 'Task Templates', subtitle: 'Create and manage task templates', toast: 'Task templates loaded.' },
      ];
      const supportItems = [
        { icon: 'book-open', title: 'Help Center', subtitle: 'Browse help articles and guides', toast: 'Help center opened.' },
        { icon: 'headphones', title: 'Contact Support', subtitle: 'Get in touch with our support team', toast: 'Support channel ready.' },
        { icon: 'bug', title: 'Report an Issue', subtitle: 'Report bugs or unexpected behavior', toast: 'Issue report form opened.' },
        { icon: 'activity', title: 'System Status', subtitle: 'Check system and service status', toast: 'All systems operational.' },
      ];
      const otherItems = [
        { icon: 'plug', title: 'Integrations', subtitle: 'Manage third-party integrations', toast: 'Integrations panel loaded.' },
        { icon: 'info', title: 'About', subtitle: 'App version and legal information', toast: 'NEXBOT Fleet Management v1.0.0' },
      ];

      container.innerHTML = `
        <div class="settings-page-layout flex-1 px-4 sm:px-5 md:px-6 py-2 overflow-y-auto hide-scrollbar animate-slide-in content-pad-bottom">
          ${renderSettingsSection('Account', accountItems)}

          ${renderSettingsSection('Support', supportItems)}
          ${renderSettingsSection('Other', otherItems)}

          <div class="settings-logout-wrap">
          <button onclick="showToast('Logging out... (Simulated)', 'warning')" class="w-full flex items-center justify-center gap-2 p-4 bg-[#121929] hover:bg-[#1a233a] rounded-2xl border border-[#1b253b] text-red-500 font-semibold text-sm transition-colors">
            <i data-lucide="log-out" class="w-4.5 h-4.5"></i>
            <span>Log Out</span>
          </button>
          </div>
        </div>
      `;
    }

    // Begin standard lifecycle operations
    window.onload = function() {
      renderApp();
    }
  </script>
