<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexbot Fleet Management</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar hide rules */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Smooth transition presets */
    .transition-all-300 {
      transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Animation helper for views changing */
    .animate-slide-in {
      animation: slideIn 250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Safe-area support for mobile devices */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }
  </style>
</head>
<body class="h-[100dvh] w-full bg-[#070b14] sm:bg-[#000000] text-white font-sans flex justify-center overflow-hidden selection:bg-blue-500/30">

  <!-- Main Mobile Container Frame -->
  <div class="w-full max-w-[480px] h-full bg-[#070b14] relative flex flex-col shadow-2xl overflow-hidden border-x border-gray-900/40">
    
    <!-- App Header -->
    <header id="app-header" class="px-5 pt-12 pb-4 flex items-center justify-between sticky top-0 z-40 bg-[#070b14]/90 backdrop-blur-md shrink-0 border-b border-gray-900/20">
      <!-- Generated Dynamically -->
    </header>

    <!-- Main Content Area where views switch dynamically -->
    <main id="main-content" class="flex-1 flex flex-col overflow-hidden relative bg-[#070b14]">
      <!-- Views are rendered inside this section dynamically -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="sticky bottom-0 w-full bg-[#070b14]/95 backdrop-blur-lg border-t border-gray-800/80 px-2 pb-safe pt-2 flex justify-between items-end z-40">
      <button onclick="navigate('dashboard')" id="nav-dashboard" class="flex-1 flex flex-col items-center justify-center gap-1 py-2 rounded-xl mb-1 mx-1 transition-all-300">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Dashboard</span>
      </button>
      
      <button onclick="navigate('robots')" id="nav-robots" class="flex-1 flex flex-col items-center justify-center gap-1 py-2 rounded-xl mb-1 mx-1 transition-all-300">
        <i data-lucide="bot" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Robots</span>
      </button>
      
      <div class="flex-1 flex justify-center -mt-6">
        <button onclick="openDispatchModal()" class="w-14 h-14 bg-blue-600 rounded-full flex flex-col items-center justify-center text-white shadow-[0_4px_20px_rgba(37,99,235,0.4)] border-4 border-[#070b14] hover:bg-blue-500 hover:scale-105 transition-all duration-200 active:scale-95">
          <i data-lucide="plus" class="w-7 h-7"></i>
        </button>
      </div>
      
      <button onclick="navigate('tasks')" id="nav-tasks" class="flex-1 flex flex-col items-center justify-center gap-1 py-2 transition-colors mb-1 mx-1 relative text-gray-500 hover:text-gray-300">
        <div class="absolute top-1.5 right-[30%] w-1.5 h-1.5 bg-blue-500 rounded-full border border-[#070b14]"></div>
        <i data-lucide="clipboard-list" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Tasks</span>
      </button>
      
      <button onclick="navigate('settings')" id="nav-settings" class="flex-1 flex flex-col items-center justify-center gap-1 py-2 rounded-xl mb-1 mx-1 transition-all-300">
        <div class="absolute top-1.5 right-[30%] w-1.5 h-1.5 bg-red-500 rounded-full border border-[#070b14]"></div>
        <i data-lucide="more-horizontal" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">More</span>
      </button>
    </nav>

    <!-- Dispatch Task Overlay Modal -->
    <div id="dispatch-modal" class="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-end justify-center">
      <div class="w-full bg-[#0d1321] rounded-t-3xl border-t border-gray-800 p-6 space-y-5 animate-slide-in max-h-[85vh] overflow-y-auto hide-scrollbar">
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-bold text-white flex items-center gap-2">
            <i data-lucide="zap" class="w-5 h-5 text-blue-500"></i> Dispatch Nexbot Task
          </h2>
          <button onclick="closeDispatchModal()" class="p-1 hover:bg-gray-800 rounded-full text-gray-400 hover:text-white transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <form id="dispatch-form" onsubmit="handleDispatchTask(event)" class="space-y-4 text-sm">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Select Robot Unit</label>
            <select id="dispatch-robot-select" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <!-- Rendered via JS -->
            </select>
          </div>
          
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Task Action</label>
            <div class="grid grid-cols-2 gap-2">
              <label class="flex items-center gap-2 bg-[#161f30] border border-gray-800 rounded-xl p-3 cursor-pointer hover:bg-blue-950/20 hover:border-blue-500/50 transition-all">
                <input type="radio" name="dispatch-action" value="Delivering" checked class="accent-blue-500">
                <span class="text-xs text-gray-200 font-medium">Deliver Goods</span>
              </label>
              <label class="flex items-center gap-2 bg-[#161f30] border border-gray-800 rounded-xl p-3 cursor-pointer hover:bg-blue-950/20 hover:border-blue-500/50 transition-all">
                <input type="radio" name="dispatch-action" value="Cleaning" class="accent-blue-500">
                <span class="text-xs text-gray-200 font-medium">Sanitize / Clean</span>
              </label>
            </div>
          </div>
          
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Destination Zone</label>
            <select id="dispatch-zone" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="1F - Lobby">1F - Lobby</option>
              <option value="1F - Restaurant">1F - Restaurant</option>
              <option value="1F - Ballroom">1F - Ballroom</option>
              <option value="1F - Concierge">1F - Concierge</option>
              <option value="1F - Charging Station">1F - Charging Station</option>
            </select>
          </div>

          <div>
            <label class="block text-xs text-gray-400 mb-1.5 font-medium">Payload Weight estimate (kg)</label>
            <input id="dispatch-payload" type="number" min="0" max="20" value="3" class="w-full bg-[#161f30] border border-gray-800 text-white rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          
          <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20">
            Confirm & Dispatch Now
          </button>
        </form>
      </div>
    </div>

    <!-- Toast Notification Wrapper -->
    <div id="toast-container" class="absolute top-16 left-1/2 -translate-x-1/2 w-[90%] z-50 flex flex-col gap-2 pointer-events-none">
      <!-- Toasts inserted programmatically -->
    </div>

  </div>

  <script>
    // System State Storage
    const state = {
      currentView: 'dashboard',
      history: ['dashboard'],
      highlightIdx: 0,
      activeRobotTab: 'all',
      searchQuery: '',
      metrics: { total: 24, online: 18, active: 16, completed: 128, battery: 78, alerts: 8 },
      tasks: { inProgress: 16, pending: 12, completed: 128, failed: 4, cancelled: 2 },
      robots: [
        { id: 'R2-03', status: 'online', x: 50, y: 15, battery: 86, location: '1F - Restaurant', activity: 'Delivering', heading: 120, coords: {x: 12.45, y: 8.32}, voltage: 24.6, temp: 31, payload: 5.2, uptimeMinutes: 3752 },
        { id: 'R1-04', status: 'busy', x: 35, y: 28, battery: 42, location: '1F - Lobby', activity: 'Cleaning', heading: 45, coords: {x: 8.12, y: 15.4}, voltage: 23.1, temp: 34, payload: 1.2, uptimeMinutes: 1420 },
        { id: 'R1-01', status: 'charging', x: 70, y: 25, battery: 12, location: '1F - Charging Station', activity: 'Charging', heading: 0, coords: {x: 2.5, y: 2.5}, voltage: 26.2, temp: 38, payload: 0, uptimeMinutes: 8500 },
        { id: 'R1-05', status: 'offline', x: 15, y: 35, battery: 5, location: '1F - Storage', activity: 'Offline', heading: 180, coords: {x: 0, y: 0}, voltage: 21.0, temp: 22, payload: 0, uptimeMinutes: 0 },
      ],
      activeTelemetryTab: 'Overview'
    };

    // Helper: Build cute robot visual model HTML markup
    function getRobotAvatarHTML(status, customClass = '') {
      const isOffline = status === 'offline';
      const glowColorClass = isOffline ? 'bg-red-500 shadow-[0_0_5px_#ef4444]' : 'bg-cyan-400 shadow-[0_0_5px_#22d3ee]';
      const sideGlowClass = isOffline ? 'bg-gray-500' : 'bg-blue-500 shadow-[0_0_5px_#3b82f6]';
      
      return `
        <div class="relative bg-gradient-to-b from-gray-700 to-gray-900 rounded-t-lg rounded-b-md shadow-inner overflow-hidden border border-gray-600/50 flex flex-col justify-end ${customClass}">
          <div class="absolute top-2 left-1/2 -translate-x-1/2 w-[60%] h-[25%] bg-black rounded border border-gray-600 flex flex-col items-center justify-center">
            <div class="w-[60%] h-[10%] rounded-full mb-1 transition-colors duration-500 ${glowColorClass}"></div>
            <div class="w-[40%] h-[10%] rounded-full transition-colors duration-500 ${glowColorClass}"></div>
          </div>
          <div class="absolute top-[40%] w-full px-1.5 space-y-1">
            <div class="h-[2px] bg-gray-600 w-full"></div>
            <div class="h-[2px] bg-gray-600 w-full"></div>
          </div>
          <div class="h-[25%] w-[80%] mx-auto bg-gray-800 border-x-[3px] border-b-[3px] border-gray-700 rounded-b"></div>
          <div class="absolute bottom-0.5 left-0 w-[15%] aspect-square rounded-full border-2 border-gray-900 transition-colors ${sideGlowClass}"></div>
          <div class="absolute bottom-0.5 right-0 w-[15%] aspect-square rounded-full border-2 border-gray-900 transition-colors ${sideGlowClass}"></div>
        </div>
      `;
    }

    // Toast alerts helper system
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let icon = 'info';
      let borderCol = 'border-blue-500/30';
      let bgCol = 'bg-blue-950/80';
      let textCol = 'text-blue-200';
      
      if (type === 'success') {
        icon = 'check-circle-2';
        borderCol = 'border-green-500/30';
        bgCol = 'bg-green-950/80';
        textCol = 'text-green-200';
      } else if (type === 'warning') {
        icon = 'alert-triangle';
        borderCol = 'border-amber-500/30';
        bgCol = 'bg-amber-950/80';
        textCol = 'text-amber-200';
      }
      
      toast.className = `p-3 rounded-xl border ${borderCol} ${bgCol} ${textCol} backdrop-blur-md shadow-lg flex items-center gap-2 text-xs transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto`;
      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i>
        <span class="font-medium">${message}</span>
      `;
      
      container.appendChild(toast);
      lucide.createIcons();
      
      // Animate entry
      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 50);
      
      // Self-destruct logic
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // Format uptime helper
    function formatUptime(mins) {
      if (mins === 0) return '0m';
      const d = Math.floor(mins / (24 * 60));
      const h = Math.floor((mins % (24 * 60)) / 60);
      const m = Math.floor(mins % 60);
      return `${d}d ${h}h ${m}m`;
    }

    function navigate(view) {
      if (state.currentView !== view) {
        state.history.push(view);
        state.currentView = view;
        renderApp();
      }
    }

    function goBack() {
      if (state.history.length > 1) {
        state.history.pop();
        state.currentView = state.history[state.history.length - 1];
        renderApp();
      }
    }

    function changeHighlight(idx) {
      state.highlightIdx = idx;
      if (state.currentView === 'dashboard') {
        updateDashboardDynamic();
      } else {
        renderApp();
      }
    }

    function setRobotTab(tab) {
      state.activeRobotTab = tab;
      const listContainer = document.getElementById('robots-list-container');
      if (listContainer) {
        updateRobotsDynamic();
        // Re-active Tab Line Indicators
        const tabs = ['all', 'online', 'busy', 'offline', 'charging'];
        tabs.forEach((tName) => {
          const indicator = document.getElementById(`tab-indicator-${tName}`);
          if (indicator) {
            if (tName === tab) {
              indicator.classList.remove('hidden');
            } else {
              indicator.classList.add('hidden');
            }
          }
        });
      } else {
        renderApp();
      }
    }

    function setTelemetryTab(tab) {
      state.activeTelemetryTab = tab;
      renderApp();
    }

    // Open & Close dispatch modal handlers
    function openDispatchModal() {
      const modal = document.getElementById('dispatch-modal');
      const select = document.getElementById('dispatch-robot-select');
      
      select.innerHTML = state.robots.map(r => `
        <option value="${r.id}" ${r.status === 'offline' ? 'disabled' : ''}>
          ${r.id} (${r.status.toUpperCase()}) - Battery: ${Math.round(r.battery)}%
        </option>
      `).join('');

      modal.classList.remove('hidden');
    }

    function closeDispatchModal() {
      document.getElementById('dispatch-modal').classList.add('hidden');
    }

    function handleDispatchTask(e) {
      e.preventDefault();
      const robotId = document.getElementById('dispatch-robot-select').value;
      const action = document.querySelector('input[name="dispatch-action"]:checked').value;
      const destination = document.getElementById('dispatch-zone').value;
      const payload = parseFloat(document.getElementById('dispatch-payload').value) || 0;

      const robotIndex = state.robots.findIndex(r => r.id === robotId);
      if (robotIndex !== -1) {
        state.robots[robotIndex].status = 'busy';
        state.robots[robotIndex].activity = action;
        state.robots[robotIndex].location = destination;
        state.robots[robotIndex].payload = payload;
        
        state.tasks.inProgress += 1;
        state.metrics.active += 1;
        
        showToast(`Dispatched ${robotId} to ${destination} for ${action}!`, 'success');
        closeDispatchModal();
        
        if (state.currentView === 'dashboard') {
          updateDashboardDynamic();
        } else {
          renderApp();
        }
      }
    }

    // Simulation logic to update coordinates, battery values, dynamic logs
    setInterval(() => {
      state.robots = state.robots.map(r => {
        if (r.status === 'charging' || r.status === 'offline') {
          if (r.status === 'charging') {
            return { 
              ...r, 
              battery: Math.min(100, r.battery + 1.2), 
              uptimeMinutes: r.uptimeMinutes + 1 
            };
          }
          return r;
        }
        
        return {
          ...r,
          x: Math.max(15, Math.min(85, r.x + (Math.random() - 0.5) * 6)), 
          y: Math.max(15, Math.min(85, r.y + (Math.random() - 0.5) * 6)), 
          battery: Math.max(0, r.battery - (Math.random() * 0.4)),
          heading: (r.heading + (Math.random() - 0.5) * 12 + 360) % 360,
          coords: {
            x: r.coords.x + (Math.random() - 0.5) * 0.4,
            y: r.coords.y + (Math.random() - 0.5) * 0.4
          },
          voltage: Math.max(22.0, Math.min(26.0, r.voltage + (Math.random() - 0.5) * 0.1)),
          temp: Math.max(25, Math.min(45, r.temp + (Math.random() - 0.5) * 0.4)),
          uptimeMinutes: r.uptimeMinutes + 1
        };
      });

      if (Math.random() > 0.6) {
        state.metrics.battery = Math.max(10, Math.min(100, state.metrics.battery + (Math.random() > 0.5 ? 0.2 : -0.2)));
        const finishedTask = Math.random() > 0.8;
        if (finishedTask) {
          state.tasks.completed += 1;
          state.tasks.inProgress = Math.max(1, state.tasks.inProgress - 1);
          showToast("A scheduled delivery dispatch has completed successfully.", "success");
        }
      }

      // NO FLICKER CRITICAL FIX: Instead of calling the heavy renderApp(), execute precise targets!
      if (state.currentView === 'dashboard') {
        updateDashboardDynamic();
      } else if (state.currentView === 'robots') {
        updateRobotsDynamic();
      } else if (state.currentView === 'robot_details') {
        updateRobotDetailsDynamic();
      }
    }, 3000);

    // Auto-cycle Highlighted robot on Dashboard
    setInterval(() => {
      if (state.currentView === 'dashboard') {
        state.highlightIdx = (state.highlightIdx + 1) % state.robots.length;
        updateDashboardDynamic();
      }
    }, 12000);

    function renderApp() {
      renderHeader();
      renderBottomNav();
      
      const mainContent = document.getElementById('main-content');
      
      if (state.currentView === 'dashboard') {
        renderDashboardSkeleton(mainContent);
      } else if (state.currentView === 'robots') {
        renderRobots(mainContent);
      } else if (state.currentView === 'robot_details') {
        renderRobotDetails(mainContent);
      } else if (state.currentView === 'settings') {
        renderSettings(mainContent);
      } else if (state.currentView === 'tasks') {
        renderTasks(mainContent);
      }
      
      lucide.createIcons();
    }

    function renderHeader() {
      const header = document.getElementById('app-header');
      if (state.currentView === 'dashboard' || state.currentView === 'settings' || state.currentView === 'tasks') {
        header.classList.remove('hidden');
        header.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600/20 flex items-center justify-center border border-blue-500/30">
              <i data-lucide="bot" class="text-blue-500 w-6 h-6"></i>
            </div>
            <div>
              <h1 class="text-xl font-bold tracking-wide text-gray-100 uppercase leading-none">Nexbot</h1>
              <span class="text-xs text-gray-400">Fleet Management</span>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="relative cursor-pointer" onclick="showToast('Your fleet systems logs are clean. 12 background processes active.', 'success')">
              <i data-lucide="bell" class="w-6 h-6 text-gray-400"></i>
              <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-[#070b14]">12</span>
            </div>
            <div onclick="navigate('settings')" class="w-8 h-8 rounded-full bg-gray-600 overflow-hidden border border-gray-500 cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all">
              <div class="w-full h-full bg-gradient-to-tr from-gray-500 to-gray-300 flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-gray-100"></i>
              </div>
            </div>
          </div>
        `;
      } else {
        header.classList.add('hidden');
      }
    }

    function renderBottomNav() {
      const navs = ['dashboard', 'robots', 'settings', 'tasks'];
      navs.forEach(nav => {
        const btn = document.getElementById(`nav-${nav}`);
        if (btn) {
          if (state.currentView === nav) {
            btn.className = "flex-1 flex flex-col items-center justify-center gap-1 py-2 rounded-xl mb-1 mx-1 text-blue-500 bg-blue-900/20 transition-all-300";
          } else {
            btn.className = "flex-1 flex flex-col items-center justify-center gap-1 py-2 rounded-xl mb-1 mx-1 text-gray-500 hover:text-gray-300 transition-all-300";
          }
        }
      });
    }

    function renderDashboardSkeleton(container) {
      container.innerHTML = `
        <div class="flex-1 px-4 flex flex-col gap-5 overflow-y-auto hide-scrollbar animate-slide-in pb-[90px]">
          
          <!-- Location & Systems Header -->
          <div class="flex items-center justify-between mt-2 shrink-0">
            <button class="flex items-center gap-2 bg-[#121929] hover:bg-[#1a233a] transition-colors px-4 py-2.5 rounded-xl border border-gray-800" onclick="showToast('Switched branch location profiles.', 'info')">
              <span class="text-xs font-medium text-gray-200">Grand Hotel Downtown</span>
              <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
            </button>
            <div class="flex items-center gap-2 bg-green-500/10 px-3 py-2.5 rounded-xl border border-green-500/20">
              <i data-lucide="check-circle-2" class="w-4 h-4 text-green-500"></i>
              <span class="text-xs font-medium text-green-500">All Systems Ok</span>
            </div>
          </div>

          <!-- Target Metrics row -->
          <div class="flex overflow-x-auto gap-3 pb-2 -mx-4 px-4 snap-x hide-scrollbar shrink-0">
            <div class="min-w-[130px] bg-[#121929] rounded-2xl p-4 border border-gray-800/60 snap-start shrink-0 flex flex-col justify-between">
              <div>
                <p class="text-[10px] text-gray-400 mb-1">Total Robots</p>
                <div class="flex items-end justify-between">
                  <span id="metric-total" class="text-3xl font-light text-white">-</span>
                  <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center border border-blue-500/20">
                    <i data-lucide="bot" class="w-4 h-4 text-blue-500"></i>
                  </div>
                </div>
              </div>
              <div class="flex items-center gap-1.5 mt-3">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="metric-online" class="text-[10px] text-gray-400">Online: -</span>
              </div>
            </div>
            
            <div class="min-w-[130px] bg-[#121929] rounded-2xl p-4 border border-gray-800/60 snap-start shrink-0 flex flex-col justify-between">
              <div>
                <p class="text-[10px] text-gray-400 mb-1">Active Tasks</p>
                <div class="flex items-end justify-between">
                  <span id="metric-active" class="text-3xl font-light text-white">-</span>
                  <i data-lucide="clipboard-list" class="w-6 h-6 text-blue-400 mb-1"></i>
                </div>
              </div>
              <div class="flex items-center gap-1.5 mt-3">
                <div class="w-2 h-2 rounded-full bg-blue-500"></div>

    function updateDashboardDynamic() {
      if (state.currentView !== 'dashboard') return;
      
      const highlightedRobot = state.robots[state.highlightIdx];
      const totalTasks = state.tasks.inProgress + state.tasks.pending + state.tasks.completed + state.tasks.failed + state.tasks.cancelled;
      const progressPercent = Math.round((state.tasks.completed / totalTasks) * 251);

      // 1. Update Metrics Rows
      const metricTotal = document.getElementById('metric-total');
      if (metricTotal) metricTotal.textContent = state.metrics.total;

      const metricOnline = document.getElementById('metric-online');
      if (metricOnline) {
        const connectedCount = state.robots.filter(x => x.status !== 'offline').length;
        metricOnline.textContent = `Online: ${connectedCount}`;
      }

      const metricActive = document.getElementById('metric-active');
      if (metricActive) metricActive.textContent = state.tasks.inProgress;

      const metricCompleted = document.getElementById('metric-completed');
      if (metricCompleted) metricCompleted.textContent = state.tasks.completed;

      const metricBattery = document.getElementById('metric-battery');
      if (metricBattery) metricBattery.textContent = `${Math.round(state.metrics.battery)}%`;

      // 2. Update Map Robots Overlay Pins selectively (Background SVG is left untouched!)
      const mapRobotsOverlay = document.getElementById('map-robots-overlay');
      if (mapRobotsOverlay) {
        mapRobotsOverlay.innerHTML = state.robots.map((robot, rIdx) => {
          const isCurrentHighlight = rIdx === state.highlightIdx;
          const statusGlow = robot.status === 'online' ? 'bg-green-500/20 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.3)]' 
                           : robot.status === 'busy' ? 'bg-blue-500/20 border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)]'
                           : robot.status === 'charging' ? 'bg-yellow-500/20 border-yellow-500' 
                           : 'bg-red-500/20 border-red-500';
          
          const statusIconCol = robot.status === 'online' ? 'text-green-400' 
                              : robot.status === 'busy' ? 'text-blue-400' 
                              : robot.status === 'charging' ? 'text-yellow-400' 
                              : 'text-red-400';

          return `
            <div onclick="changeHighlight(${rIdx})" class="absolute flex flex-col items-center z-20 transition-all duration-1000 ease-linear cursor-pointer" style="top: ${robot.y}%; left: ${robot.x}%; transform: translate(-50%, -50%)">
              <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center ${statusGlow} ${isCurrentHighlight ? 'ring-2 ring-white scale-110' : ''}">
                <i data-lucide="bot" class="w-4 h-4 ${statusIconCol}"></i>
                ${robot.status === 'offline' ? `<i data-lucide="alert-triangle" class="absolute -right-2 -top-1 w-4 h-4 text-red-500 bg-[#0a101d] rounded-full p-0.5"></i>` : ''}
              </div>
              <span class="text-[9px] font-bold mt-1 bg-[#0a101d] px-1 rounded transition-colors ${statusIconCol}">${robot.id}</span>
            </div>
          `;
        }).join('');
        
        lucide.createIcons({ node: mapRobotsOverlay });
      }

      // 3. Update Highlight Details
      const highlightAvatar = document.getElementById('highlight-avatar');
      if (highlightAvatar) {
        highlightAvatar.innerHTML = getRobotAvatarHTML(highlightedRobot.status, 'w-full h-full');
      }

      const highlightId = document.getElementById('highlight-id');
      if (highlightId) highlightId.textContent = highlightedRobot.id;

      const highlightStatusPill = document.getElementById('highlight-status-pill');
      if (highlightStatusPill) {
        highlightStatusPill.className = `flex items-center gap-1 px-1 py-0.5 rounded text-[8px] border transition-colors ${
          highlightedRobot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
          : highlightedRobot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
          : highlightedRobot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
          : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        highlightStatusPill.innerHTML = `
          <div class="w-1 h-1 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500' : highlightedRobot.status === 'busy' ? 'bg-blue-500' : highlightedRobot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></div>
          <span class="capitalize text-[8px]">${highlightedRobot.status}</span>
        `;
      }

      const highlightBatteryPercent = document.getElementById('highlight-battery-percent');
      if (highlightBatteryPercent) highlightBatteryPercent.textContent = `${Math.round(highlightedRobot.battery)}%`;

      const highlightBatteryBar = document.getElementById('highlight-battery-bar');
      if (highlightBatteryBar) {
        highlightBatteryBar.className = `h-full rounded-full transition-all duration-500 ${highlightedRobot.battery > 20 ? 'bg-green-500' : 'bg-red-500'}`;
        highlightBatteryBar.style.width = `${highlightedRobot.battery}%`;
      }

      const highlightLocation = document.getElementById('highlight-location');
      if (highlightLocation) highlightLocation.textContent = highlightedRobot.location;

      const highlightActivity = document.getElementById('highlight-activity');
      if (highlightActivity) highlightActivity.textContent = highlightedRobot.activity;

      const highlightCameraLive = document.getElementById('highlight-camera-live');
      if (highlightCameraLive) {
        highlightCameraLive.style.opacity = highlightedRobot.status === 'offline' ? '0.2' : '0.6';
      }

      const highlightCameraStatus = document.getElementById('highlight-camera-status');
      if (highlightCameraStatus) {
        highlightCameraStatus.innerHTML = `
          <div class="w-1 h-1 rounded-full ${highlightedRobot.status === 'offline' ? 'bg-red-500' : 'bg-green-500 animate-pulse'}"></div>
          <span>${highlightedRobot.status === 'offline' ? 'Offline' : 'Camera Live'}</span>
        `;
      }

      // 4. Update Tasks donut offsets
      const tasksDonutCircle = document.getElementById('tasks-donut-circle');
      if (tasksDonutCircle) {
        tasksDonutCircle.setAttribute('stroke-dasharray', `${progressPercent} 251`);
      }

      const tasksTotalCenter = document.getElementById('tasks-total-center');
      if (tasksTotalCenter) tasksTotalCenter.textContent = totalTasks;

      const tasksActiveCount = document.getElementById('tasks-active-count');
      if (tasksActiveCount) tasksActiveCount.textContent = state.tasks.inProgress;

      const tasksCompletedCount = document.getElementById('tasks-completed-count');
      if (tasksCompletedCount) tasksCompletedCount.textContent = state.tasks.completed;

      const tasksFailedCount = document.getElementById('tasks-failed-count');
      if (tasksFailedCount) tasksFailedCount.textContent = state.tasks.failed;

      const batteryTrendAvg = document.getElementById('battery-trend-avg');
      if (batteryTrendAvg) batteryTrendAvg.textContent = `${Math.round(state.metrics.battery)}%`;
    }

    function renderRobots(container) {

              return `
                <button onclick="setRobotTab('${tabLower}')" class="pb-3 text-xs font-semibold relative ${isActive ? 'text-blue-400' : 'text-gray-400 hover:text-gray-200'}">

          <div id="robots-list-container" class="flex-1 px-4 overflow-y-auto flex flex-col gap-3 pb-[90px] hide-scrollbar"></div>

          <!-- Quick status update at bottom -->

          </div>
        </div>
      `;
      
      updateRobotsDynamic();
    }

    // Precise DOM updates on list view items
    function updateRobotsDynamic() {
      const listContainer = document.getElementById('robots-list-container');
      if (!listContainer) return;

      let filtered = state.robots;
      if (state.activeRobotTab === 'online') {
        filtered = state.robots.filter(r => r.status === 'online');
      } else if (state.activeRobotTab === 'busy') {
        filtered = state.robots.filter(r => r.status === 'busy');
      } else if (state.activeRobotTab === 'offline') {
        filtered = state.robots.filter(r => r.status === 'offline');
      } else if (state.activeRobotTab === 'charging') {
        filtered = state.robots.filter(r => r.status === 'charging');
      }

      listContainer.innerHTML = filtered.length === 0 ? `
        <div class="py-12 text-center text-xs text-gray-500">
          <i data-lucide="info" class="w-8 h-8 mx-auto mb-2 text-gray-600"></i>
          No robots match the current filter state
        </div>
      ` : filtered.map((robot) => {
        const statusCol = robot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
                         : robot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
                         : robot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
                         : 'bg-red-500/10 text-red-400 border-red-500/20';
        
        const statusIndicatorCol = robot.status === 'online' ? 'bg-green-500' 
                                 : robot.status === 'busy' ? 'bg-blue-500' 
                                 : robot.status === 'charging' ? 'bg-yellow-500' 
                                 : 'bg-red-500';

        const masterIndex = state.robots.findIndex(r => r.id === robot.id);

        return `
          <div 
            onclick="changeHighlight(${masterIndex}); navigate('robot_details');"
            class="bg-[#121929] rounded-2xl border border-gray-800/60 p-3 flex items-stretch gap-4 cursor-pointer hover:bg-[#1a233a] transition-colors shrink-0"
          >
            <div class="w-[75px] shrink-0 h-[92px]">${getRobotAvatarHTML(robot.status, 'w-full h-full')}</div>
            
            <div class="flex-1 flex flex-col justify-between py-0.5">
              <div class="flex justify-between items-start mb-1">
                <div class="flex items-center gap-2">
                  <h3 class="text-base font-bold text-white">${robot.id}</h3>
                  <div class="flex items-center gap-1 px-1.5 py-0.5 rounded text-[8px] border ${statusCol}">
                    <div class="w-1.5 h-1.5 rounded-full ${statusIndicatorCol}"></div>
                    <span class="capitalize font-semibold text-[8px]">${robot.status}</span>
                  </div>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
              </div>
              
              <p class="text-[10px] text-gray-400 mb-2">NEXBOT Pro Delivery Unit</p>
              
              <div class="grid grid-cols-[55px_1fr] gap-y-1 text-[10px]">

                <div class="flex items-center gap-2">
                  <span class="text-gray-200 font-medium w-6">${Math.round(robot.battery)}%</span>
                  <div class="w-20 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-500 ${robot.battery > 20 ? 'bg-green-500' : 'bg-red-500'}" style="width: ${robot.battery}%"></div>
                  </div>
                </div>

                <span class="text-gray-500 font-medium">Location</span>
                <span class="${robot.status === 'offline' ? 'text-gray-400' : 'text-green-400'} truncate w-32 font-semibold">${robot.location}</span>

                <span class="text-gray-500 font-medium">Task</span>
                <span class="text-gray-200 truncate w-32">${robot.activity}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons({ node: listContainer });

      const connectedCount = document.getElementById('connected-count-val');
      if (connectedCount) {
        connectedCount.textContent = `${state.robots.filter(r => r.status !== 'offline').length} Units Connected`;
      }
    }

    function renderRobotDetails(container) {
      container.innerHTML = `
        <div class="flex-1 flex flex-col bg-[#070b14] overflow-hidden animate-slide-in">

              <div class="flex-1 flex justify-between h-[92px]">
                <div class="flex flex-col justify-between h-full">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <h2 id="details-id" class="text-lg font-bold text-white leading-none">-</h2>

                    </div>
                    <p id="details-location" class="text-[10px] text-gray-400 truncate w-36">-</p>
                  </div>
                  
                  <div class="flex gap-1.5">
                    <div class="bg-[#1a233a] rounded-lg px-2 py-1 flex flex-col">
                      <span class="text-[7px] text-gray-500 font-medium">Firmware</span>
                      <span class="text-[9px] font-bold text-gray-200">v2.4.6</span>

                      </div>
                      
                      <div class="flex items-center gap-2 mt-2">
                        <i data-lucide="compass" class="w-4 h-4 text-gray-400"></i>
                        <div class="flex flex-col">
                          <span class="text-[7px] text-gray-500 uppercase leading-none">Orientation</span>
                          <span id="details-heading" class="text-[11px] font-bold text-gray-200 leading-tight">-</span>
                        </div>
                      </div>

                      <div class="mt-2 text-[9px] font-mono bg-black/40 p-1.5 rounded-lg border border-gray-800">
                        <div id="details-coords">-</div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Power and Payload Double Gauge Column layout -->
                <div class="grid grid-cols-2 gap-4 shrink-0 mt-4">
                  <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 flex flex-col justify-between">
                    <h3 class="text-[10px] font-semibold text-gray-400 uppercase mb-3">Power Subsystem</h3>
                    <div class="space-y-2 text-[10px]">
                      <div class="flex justify-between border-b border-gray-800/50 pb-1">
                        <span class="text-gray-500">Voltage</span>
                        <span id="details-voltage" class="text-gray-200 font-semibold">-</span>
                      </div>
                      <div class="flex justify-between border-b border-gray-800/50 pb-1">
                        <span class="text-gray-500">Core Temp</span>
                        <span id="details-temp" class="text-gray-200 font-semibold">-</span>
                      </div>
                    </div>
                    <button onclick="showToast('Re-balancing battery cell channels...', 'success')" class="w-full mt-3 py-1.5 bg-[#161f30] border border-blue-500/20 text-blue-400 text-[10px] font-medium rounded-lg">
                      Balance Cells
                    </button>
                  </div>

                  <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 flex flex-col justify-between">
                    <h3 class="text-[10px] font-semibold text-gray-400 uppercase mb-3">Payload Status</h3>
                    <div class="space-y-2 text-[10px]">
                      <div class="flex justify-between border-b border-gray-800/50 pb-1">
                        <span class="text-gray-500">Load</span>
                        <span id="details-payload" class="text-gray-200 font-semibold">-</span>
                      </div>
                      <div class="flex justify-between border-b border-gray-800/50 pb-1">
                        <span class="text-gray-500">Limit Max</span>
                        <span class="text-gray-200 font-semibold">20.0 kg</span>
                      </div>
                    </div>
                    <button onclick="showToast('Zero-out scale calibrators active', 'success')" class="w-full mt-3 py-1.5 bg-[#161f30] border border-blue-500/20 text-blue-400 text-[10px] font-medium rounded-lg">
                      Calibrate Scale
                    </button>
                  </div>
                </div>

              ` : state.activeTelemetryTab === 'Hardware' ? `
                
                <!-- Hardware Inspector List -->
                <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 shrink-0">
                  <h3 class="text-xs font-semibold text-gray-200 mb-3">System Module Bus Status</h3>
                  <div class="space-y-2">
                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">
                      <span class="text-gray-300 flex items-center gap-1.5"><i data-lucide="cpu" class="w-4 h-4 text-green-500"></i> Main ECU Processor</span>
                      <span class="text-green-500 font-semibold">ONLINE</span>
                    </div>
                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">
                      <span class="text-gray-300 flex items-center gap-1.5"><i data-lucide="zap" class="w-4 h-4 text-green-500"></i> Motor Controllers</span>
                      <span class="text-green-500 font-semibold">ONLINE</span>
                    </div>
                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">
                      <span class="text-gray-300 flex items-center gap-1.5"><i data-lucide="shield" class="w-4 h-4 text-green-500"></i> Safety Watchdog</span>
                      <span class="text-green-400 font-semibold">SECURED</span>
                    </div>
                  </div>
                </div>

              ` : `
                
                <!-- Sensors inspector telemetry logs -->
                <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 shrink-0">
                  <h3 class="text-xs font-semibold text-gray-200 mb-3">LiDAR / Optical Arrays</h3>
                  <div class="space-y-2">
                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">
                      <span class="text-gray-300">Front LiDAR scan rate</span>

                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">
                      <span class="text-gray-300">Depth cameras feed</span>
                      <span class="text-green-500 font-semibold">HEALTHY</span>
                    </div>
                    <div class="flex justify-between items-center bg-[#161f30] px-3 py-2 rounded-lg border border-gray-800/80 text-xs">

                      <span class="text-gray-200">Active (4/4)</span>

            <!-- Operational control buttons -->
            <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 shrink-0 mt-4">
              <h3 class="text-xs font-semibold text-gray-200 mb-3">Unit Maintenance Action</h3>
              <div class="grid grid-cols-2 gap-3">
                <button onclick="showToast('Remote reboot command sequence sent to unit.', 'warning')" class="py-2.5 bg-amber-600/20 hover:bg-amber-600/30 text-amber-300 rounded-xl text-xs font-semibold border border-amber-500/20">
                  Reboot Systems
                </button>
                <button onclick="showToast('EMERGENCY HALT COMMAND SENT', 'warning')" class="py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl text-xs font-semibold">
                  EMERGENCY STOP
                </button>
              </div>
            </div>

          </div>
        </div>
      `;
      
      lucide.createIcons();
      updateRobotDetailsDynamic();
    }

    // Dynamic precise values inside inspector
    function updateRobotDetailsDynamic() {
      if (state.currentView !== 'robot_details') return;

      const highlightedRobot = state.robots[state.highlightIdx];
      const isCharging = highlightedRobot.status === 'charging';

      const detailsAvatar = document.getElementById('details-avatar');
      if (detailsAvatar) {
        detailsAvatar.innerHTML = getRobotAvatarHTML(highlightedRobot.status, 'w-full h-full');
      }

      const detailsId = document.getElementById('details-id');
      if (detailsId) detailsId.textContent = highlightedRobot.id;

      const detailsStatusPill = document.getElementById('details-status-pill');
      if (detailsStatusPill) {
        detailsStatusPill.className = `flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[8px] border ${
          highlightedRobot.status === 'online' ? 'bg-green-500/10 text-green-400 border-green-500/20' 
          : highlightedRobot.status === 'busy' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' 
          : highlightedRobot.status === 'charging' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' 
          : 'bg-red-500/10 text-red-400 border-red-500/20'
        }`;
        detailsStatusPill.innerHTML = `
          <div class="w-1.5 h-1.5 rounded-full ${highlightedRobot.status === 'online' ? 'bg-green-500' : highlightedRobot.status === 'busy' ? 'bg-blue-500' : highlightedRobot.status === 'charging' ? 'bg-yellow-500' : 'bg-red-500'}"></div>
          <span class="capitalize font-semibold text-[8px]">${highlightedRobot.status}</span>
        `;
      }

      const detailsLocation = document.getElementById('details-location');
      if (detailsLocation) detailsLocation.textContent = highlightedRobot.location;

      const detailsUptime = document.getElementById('details-uptime');
      if (detailsUptime) detailsUptime.textContent = formatUptime(highlightedRobot.uptimeMinutes);

      const detailsBatteryText = document.getElementById('details-battery-text');
      if (detailsBatteryText) detailsBatteryText.textContent = `${Math.round(highlightedRobot.battery)}%`;

      const detailsBatteryIconZap = document.getElementById('details-battery-icon-zap');
      if (detailsBatteryIconZap) {
        detailsBatteryIconZap.style.display = isCharging ? 'block' : 'none';
      }

      if (state.activeTelemetryTab === 'Overview') {
        const detailsHeading = document.getElementById('details-heading');
        if (detailsHeading) detailsHeading.textContent = `${Math.round(highlightedRobot.heading)}° SE`;

        const detailsCoords = document.getElementById('details-coords');
        if (detailsCoords) {
          detailsCoords.innerHTML = `
            <div>X: ${highlightedRobot.coords.x.toFixed(3)} m</div>
            <div>Y: ${highlightedRobot.coords.y.toFixed(3)} m</div>
          `;
        }

        const detailsVoltage = document.getElementById('details-voltage');
        if (detailsVoltage) detailsVoltage.textContent = `${highlightedRobot.voltage.toFixed(1)} V`;

        const detailsTemp = document.getElementById('details-temp');
        if (detailsTemp) detailsTemp.textContent = `${highlightedRobot.temp.toFixed(1)}°C`;

        const detailsPayload = document.getElementById('details-payload');
        if (detailsPayload) detailsPayload.textContent = `${highlightedRobot.payload.toFixed(1)} kg`;
      }
    }

    function renderTasks(container) {
      container.innerHTML = `
        <div class="flex-1 px-4 flex flex-col gap-4 overflow-y-auto hide-scrollbar animate-slide-in pb-[90px]">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-200 mt-2">Active Task Logs</h2>
          
          <div class="bg-[#121929] rounded-2xl p-4 border border-gray-800/60 space-y-4">

                <h3 class="text-xs font-bold text-white">Route T-892</h3>
                <p class="text-[10px] text-gray-400">Target Zone: Room 104 Delivery</p>
              </div>
              <span class="text-[9px] font-bold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-2 py-0.5 rounded">In Progress</span>

    function renderSettings(container) {
      container.innerHTML = `
        <div class="flex-1 px-4 py-2 flex flex-col gap-5 overflow-y-auto hide-scrollbar animate-slide-in pb-[90px]">
          <div>

            <div class="bg-[#121929] rounded-2xl border border-gray-800/60 overflow-hidden divide-y divide-gray-800/50">
              <div onclick="showToast('Mock profile details configured.', 'info')" class="flex items-center justify-between p-3.5 hover:bg-[#1a233a] cursor-pointer">
                <span class="text-xs font-medium text-gray-200">Owner Profile settings</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
              </div>
              <div onclick="showToast('Notification schedules active', 'info')" class="flex items-center justify-between p-3.5 hover:bg-[#1a233a] cursor-pointer">

            <i data-lucide="log-out" class="w-4 h-4"></i>
            <span>Log Out System Session</span>
          </button>
        </div>
      `;
    }

    // Begin standard lifecycle operations
    window.onload = function() {
      renderApp();
    }
  </script>
